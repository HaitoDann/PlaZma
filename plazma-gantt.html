<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlaZma — Gantt Dynamique</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070f;--bg2:#0c0b18;--surface:#10101e;--surface2:#141428;
  --border:#1c1b33;--border2:#252444;
  --v1:#6d28d9;--v2:#7c3aed;--v3:#8b5cf6;--v4:#a78bfa;
  --text:#e8e6f4;--text2:#8b82b0;--text3:#45405e;
  --today:#f59e0b;
}

body{background:var(--bg);font-family:'Barlow',sans-serif;color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 16px 80px}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:24px;flex-wrap:wrap;justify-content:center}
.btn{padding:8px 18px;border-radius:7px;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border:none;font-family:'Barlow',sans-serif;transition:all .2s;display:flex;align-items:center;gap:6px}
.btn-primary{background:var(--v2);color:#fff;box-shadow:0 0 22px rgba(124,58,237,.4)}
.btn-primary:hover{background:var(--v3);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.4;cursor:default;transform:none}
.btn-ghost{background:var(--surface2);color:var(--text2);border:1px solid var(--border2)}
.btn-ghost:hover{border-color:var(--v3);color:var(--v4)}
.btn-ghost.active{background:rgba(124,58,237,.15);border-color:var(--v3);color:var(--v4)}
.year-nav{display:flex;align-items:center;gap:0;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;overflow:hidden}
.year-btn{background:none;border:none;color:var(--text2);padding:8px 12px;cursor:pointer;font-size:14px;transition:all .15s;font-family:'Barlow',sans-serif}
.year-btn:hover{background:rgba(124,58,237,.15);color:var(--v4)}
.year-val{padding:6px 16px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--text);letter-spacing:2px;min-width:60px;text-align:center;border-left:1px solid var(--border2);border-right:1px solid var(--border2)}
.view-toggle{display:flex;gap:0;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;overflow:hidden}
.view-btn{background:none;border:none;color:var(--text2);padding:8px 14px;cursor:pointer;font-size:10px;font-family:'Barlow',sans-serif;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;transition:all .15s;border-right:1px solid var(--border2)}
.view-btn:last-child{border-right:none}
.view-btn.active{background:rgba(124,58,237,.2);color:var(--v4)}
.view-btn:hover:not(.active){background:rgba(255,255,255,.03)}

/* CARD */
.card{width:100%;max-width:1280px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 0 0 1px rgba(109,40,217,.07),0 40px 120px rgba(0,0,0,.7)}

/* HEADER */
.card-header{position:relative;overflow:hidden;padding:22px 32px 18px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:16px}
.card-header::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 50% 200% at 0% 50%,rgba(109,40,217,.18) 0%,transparent 60%)}
.card-header::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--v1) 0%,var(--v3) 35%,transparent 70%)}
.logo-row{display:flex;align-items:center;gap:12px}
.logo-badge{width:38px;height:38px;background:linear-gradient(135deg,var(--v1),var(--v3));border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:#fff;box-shadow:0 0 16px rgba(124,58,237,.5)}
.club-name{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(135deg,#fff 0%,var(--v4) 40%,var(--v3) 75%,#fff 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.doc-type{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--v4);margin-top:2px}
.header-right{display:flex;align-items:center;gap:10px}
.season-tag{background:rgba(109,40,217,.15);border:1px solid rgba(109,40,217,.3);border-radius:4px;padding:3px 10px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--v4)}
.today-indicator{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--today);letter-spacing:1px}
.today-dot{width:6px;height:6px;border-radius:50%;background:var(--today);box-shadow:0 0 8px var(--today)}

/* GANTT LAYOUT */
.gantt-wrap{display:flex;flex-direction:column;overflow:hidden}

/* MONTH HEADER */
.gantt-header{display:flex;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10}
.gantt-label-col{width:240px;min-width:240px;padding:10px 16px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);border-right:1px solid var(--border);flex-shrink:0;display:flex;align-items:center}
.gantt-months{flex:1;display:grid;overflow:hidden}
.month-cell{padding:10px 4px;text-align:center;border-right:1px solid var(--border);font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);position:relative}
.month-cell.current-month{color:var(--v4)}
.month-cell.current-month::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:2px;background:var(--v2);border-radius:2px}

/* WEEK SUB-HEADER */
.gantt-weeks-header{display:flex;border-bottom:2px solid var(--border2);background:var(--surface2)}
.gantt-label-col-sub{width:240px;min-width:240px;border-right:1px solid var(--border);flex-shrink:0}
.week-cells{flex:1;display:grid;overflow:hidden}
.week-cell{border-right:1px solid rgba(28,27,51,.6);position:relative;min-height:20px}
.week-num{font-size:8px;color:var(--text3);text-align:center;padding:3px 0;letter-spacing:1px}
.week-cell.today-week .week-num{color:var(--today)}
.week-cell.today-week::after{content:'';position:absolute;bottom:0;left:50%;width:1px;height:200vh;background:rgba(245,158,11,.15);pointer-events:none;z-index:1}

/* CATEGORY ROWS */
.cat-section{}
.cat-header-row{display:flex;background:var(--surface2);border-bottom:1px solid var(--border);border-top:1px solid var(--border);cursor:pointer;transition:background .15s}
.cat-header-row:hover{background:rgba(255,255,255,.01)}
.cat-label{width:240px;min-width:240px;padding:10px 16px;display:flex;align-items:center;gap:8px;border-right:1px solid var(--border);flex-shrink:0}
.cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.cat-name{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.cat-toggle{margin-left:auto;font-size:10px;color:var(--text3);transition:transform .2s}
.cat-toggle.open{transform:rotate(90deg)}
.cat-grid-bg{flex:1;background:repeating-linear-gradient(90deg,transparent,transparent calc(var(--col-w) - 1px),rgba(28,27,51,.4) calc(var(--col-w) - 1px),rgba(28,27,51,.4) var(--col-w))}
.cat-add-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:1px dashed rgba(255,255,255,.1);color:var(--text3);font-size:10px;padding:2px 8px;border-radius:4px;cursor:pointer;letter-spacing:1px;text-transform:uppercase;font-family:'Barlow',sans-serif;transition:all .15s;opacity:0}
.cat-label:hover .cat-add-btn{opacity:1}
.cat-add-btn:hover{border-color:var(--v3);color:var(--v4)}

/* TASK ROWS */
.task-row{display:flex;position:relative;border-bottom:1px solid rgba(28,27,51,.5);min-height:40px;transition:background .12s}
.task-row:hover{background:rgba(255,255,255,.01)}
.task-label-cell{width:240px;min-width:240px;padding:0 16px;display:flex;align-items:center;gap:6px;border-right:1px solid var(--border);flex-shrink:0;position:relative}
.task-color-bar{width:3px;height:60%;border-radius:2px;flex-shrink:0}
.task-label-text{font-size:11px;color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.task-del-btn{background:none;border:none;color:var(--text3);font-size:10px;cursor:pointer;opacity:0;transition:opacity .15s;padding:2px;line-height:1}
.task-label-cell:hover .task-del-btn{opacity:1}
.task-del-btn:hover{color:#ef4444}

.task-grid{flex:1;position:relative;cursor:crosshair}
.col-bg{position:absolute;top:0;bottom:0;border-right:1px solid rgba(28,27,51,.4);pointer-events:none}
.col-bg.weekend{background:rgba(255,255,255,.007)}

/* BAR */
.gantt-bar{position:absolute;top:6px;bottom:6px;border-radius:5px;cursor:grab;display:flex;align-items:center;padding:0 8px;overflow:hidden;transition:filter .15s,box-shadow .15s;z-index:2;min-width:4px;user-select:none}
.gantt-bar:hover{filter:brightness(1.2);box-shadow:0 0 12px rgba(0,0,0,.4)}
.gantt-bar.dragging{cursor:grabbing;filter:brightness(1.3);box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:10}
.bar-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.9);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;pointer-events:none;letter-spacing:.3px}
.bar-handle{position:absolute;top:0;bottom:0;width:6px;cursor:ew-resize;background:rgba(255,255,255,.15);border-radius:inherit;transition:background .15s}
.bar-handle:hover{background:rgba(255,255,255,.3)}
.bar-handle-left{left:0;border-radius:5px 0 0 5px}
.bar-handle-right{right:0;border-radius:0 5px 5px 0}

/* PROGRESS DOT */
.bar-progress{position:absolute;top:50%;transform:translateY(-50%);height:3px;background:rgba(255,255,255,.25);border-radius:2px;pointer-events:none}

/* TODAY LINE */
.today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--today);z-index:5;pointer-events:none}
.today-line::before{content:'▼';position:absolute;top:-6px;left:50%;transform:translateX(-50%);font-size:8px;color:var(--today)}

/* FOOTER */
.card-footer{border-top:1px solid var(--border);background:var(--surface);padding:10px 32px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.footer-brand{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--text3)}
.legend-items{display:flex;gap:14px;align-items:center}
.leg{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--text3)}
.leg-dot{width:8px;height:8px;border-radius:3px}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(7,7,15,.88);backdrop-filter:blur(8px);z-index:300;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:26px;width:400px;max-width:94vw;box-shadow:0 0 80px rgba(0,0,0,.7)}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--v4);margin-bottom:18px}
.field{margin-bottom:14px}
.field label{display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:6px}
.field input,.field select{width:100%;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:9px 12px;border-radius:7px;font-size:13px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .2s}
.field input:focus,.field select:focus{border-color:var(--v3)}
.field input[type=color]{height:36px;padding:3px 6px;cursor:pointer}
.field select option{background:var(--surface)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.btn-confirm{flex:1;background:var(--v2);color:#fff;justify-content:center}
.btn-confirm:hover{background:var(--v3)}
.btn-cancel-m{flex:1;background:var(--surface);color:var(--text2);border:1px solid var(--border2);justify-content:center}
.btn-cancel-m:hover{border-color:var(--v3);color:var(--v4)}
.modal-del{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2);margin-right:auto;flex:0;padding:8px 14px}
.modal-del:hover{background:rgba(239,68,68,.2)}

/* CONTEXT MENU */
.ctx-menu{position:fixed;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:4px;z-index:400;min-width:160px;box-shadow:0 8px 32px rgba(0,0,0,.6);display:none}
.ctx-menu.open{display:block}
.ctx-item{padding:8px 12px;border-radius:5px;font-size:12px;cursor:pointer;transition:background .12s;display:flex;align-items:center;gap:8px;color:var(--text2)}
.ctx-item:hover{background:rgba(255,255,255,.05);color:var(--text)}
.ctx-item.danger{color:#ef4444}
.ctx-item.danger:hover{background:rgba(239,68,68,.1)}
.ctx-sep{height:1px;background:var(--border);margin:3px 0}

/* EMPTY STATE */
.empty-row{display:flex;align-items:center;justify-content:center;padding:16px;color:var(--text3);font-size:11px;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid rgba(28,27,51,.4)}
</style>

</head>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">PlaZma</div>

  </div>
</div>

<!-- MODAL TASK -->
<div class="overlay" id="overlayTask">
  <div class="modal">
    <div class="modal-title" id="taskModalTitle">Nouvelle tâche</div>
    <div class="field"><label>Nom de la tâche</label><input type="text" id="tName" placeholder="ex: Préparation Nexus Tour"></div>

    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel-m modal-del" id="taskDelBtn" style="display:none">🗑</button>
      <button class="btn btn-cancel-m" onclick="closeModals()">Annuler</button>
      <button class="btn btn-confirm" id="taskConfirmBtn">Créer</button>
    </div>
  </div>
</div>

<!-- MODAL CATEGORY -->
<div class="overlay" id="overlayCat">
  <div class="modal">
    <div class="modal-title" id="catModalTitle">Nouvelle catégorie</div>
    <div class="field"><label>Nom</label><input type="text" id="cName" placeholder="ex: Communication"></div>
    <div class="field"><label>Couleur</label><input type="color" id="cColor" value="#8b5cf6"></div>
    <div class="modal-actions">
      <button class="btn btn-cancel-m modal-del" id="catDelBtn" style="display:none">🗑 Supprimer</button>
      <button class="btn btn-cancel-m" onclick="closeModals()">Annuler</button>

// ─── DATE UTILS ─────────────────────────────────────────────
function dayOfYear(d){ const s=new Date(d.getFullYear(),0,0); return Math.floor((d-s)/86400000); }
function daysInYear(y){ return (new Date(y,1,29).getMonth()===1)?366:365; }
function dateToRatio(dateStr, year){
  const d=new Date(dateStr+'T00:00:00');
  if(d.getFullYear()<year) return 0;
  if(d.getFullYear()>year) return 1;
  return (dayOfYear(d)-1)/(daysInYear(year));
}
function dateFromRatio(ratio, year){
  const d=new Date(year,0,1); d.setDate(d.getDate()+Math.round(ratio*(daysInYear(year)-1)));
  return d.toISOString().split('T')[0];
}
function getWeeks(year){
  const weeks=[];
  let d=new Date(year,0,1);
  while(d.getDay()!==1) d.setDate(d.getDate()+1);
  while(d.getFullYear()<=year){
    const start=new Date(d);
    const end=new Date(d); end.setDate(end.getDate()+6);
    const wn=getWeekNum(start);
    weeks.push({start:new Date(start),end:new Date(end),num:wn});
    d.setDate(d.getDate()+7);
    if(d.getFullYear()>year) break;
  }
  return weeks;
}
function getWeekNum(d){
  const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const day=date.getUTCDay()||7; date.setUTCDate(date.getUTCDate()+4-day);
  const y1=new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.ceil((((date-y1)/86400000)+1)/7);
}
function todayRatio(year){ return dateToRatio(now.toISOString().split('T')[0],year); }

function renderGantt(){
  const wrap=document.getElementById('ganttWrap');
  wrap.innerHTML='';
  const colW = viewMode==='week' ? 'var(--col-w)' : 'var(--col-w)';

  const weeks = getWeeks(currentYear);
  const totalCols = viewMode==='month' ? 12 : weeks.length;
  const colPercent = 100/totalCols;
  wrap.style.setProperty('--col-w', colPercent+'%');

  // MONTH HEADER
  const hdr=document.createElement('div');
  hdr.className='gantt-header';
  const lc=document.createElement('div'); lc.className='gantt-label-col'; lc.textContent='Projet / Tâche';
  hdr.appendChild(lc);
  const mc=document.createElement('div'); mc.className='gantt-months';
  mc.style.gridTemplateColumns=`repeat(${totalCols},1fr)`;

  if(viewMode==='month'){
    MONTHS.forEach((m,i)=>{
      const cell=document.createElement('div'); cell.className='month-cell';
      if(now.getFullYear()===currentYear && now.getMonth()===i) cell.classList.add('current-month');
      cell.textContent=m; mc.appendChild(cell);
    });
  } else {
    weeks.forEach((w,i)=>{
      const cell=document.createElement('div'); cell.className='month-cell';
      const isCur=now>=w.start && now<=w.end && now.getFullYear()===currentYear;
      if(isCur) cell.classList.add('current-month');
      const mo=MONTHS[w.start.getMonth()];
      cell.style.fontSize='8px';
      cell.textContent=mo; mc.appendChild(cell);
    });

  hdr.appendChild(mc);

  // WEEK SUB-HEADER (week mode)

    const wh=document.createElement('div'); wh.className='gantt-weeks-header';
    const wls=document.createElement('div'); wls.className='gantt-label-col-sub'; wh.appendChild(wls);
    const wcs=document.createElement('div'); wcs.className='week-cells';
    wcs.style.gridTemplateColumns=`repeat(${weeks.length},1fr)`;
    weeks.forEach(w=>{
      const wc=document.createElement('div'); wc.className='week-cell';
      const isCur=now>=w.start && now<=w.end && now.getFullYear()===currentYear;
      if(isCur) wc.classList.add('today-week');
      wc.innerHTML=`<div class="week-num">S${w.num}</div>`;
      wcs.appendChild(wc);
    });
    wh.appendChild(wcs); wrap.appendChild(wh);
  }

  // CATEGORIES & TASKS

    const cl=document.createElement('div'); cl.className='cat-label'; cl.style.position='relative';
    cl.innerHTML=`<div class="cat-dot" style="background:${cat.color}"></div>
      <span class="cat-name" style="color:${cat.color}">${cat.name}</span>
      <span class="cat-toggle ${isOpen?'open':''}">▶</span>`;
    // Edit cat btn
    const editCatBtn=document.createElement('button');
    editCatBtn.className='cat-add-btn'; editCatBtn.textContent='✏ éditer';
    editCatBtn.style.cssText='position:absolute;right:36px;top:50%;transform:translateY(-50%)';
    editCatBtn.addEventListener('click',e=>{e.stopPropagation();openEditCat(cat.id);});
    cl.appendChild(editCatBtn);
    // Add task btn
    const addTBtn=document.createElement('button');

    addTBtn.addEventListener('click',e=>{e.stopPropagation();openAddTaskInCat(cat.id);});

        er.style.cssText='display:flex;border-bottom:1px solid rgba(28,27,51,.4)';
        const etxt=document.createElement('div'); etxt.style.cssText='flex:1;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text3);letter-spacing:1px;text-transform:uppercase';
        etxt.textContent='Aucune tâche — cliquez + tâche';

function buildTaskRow(task, totalCols, weeks){
  const tr=document.createElement('div'); tr.className='task-row';

  // Label
  const lc=document.createElement('div'); lc.className='task-label-cell';
  lc.innerHTML=`<div class="task-color-bar" style="background:${task.color}"></div>
    <span class="task-label-text" title="${task.name}">${task.name}</span>
    <button class="task-del-btn" title="Supprimer">✕</button>`;
  lc.querySelector('.task-del-btn').addEventListener('click',e=>{ e.stopPropagation(); deleteTask(task.id); });
  tr.appendChild(lc);

  // Grid
  const grid=document.createElement('div'); grid.className='task-grid';

  // Col backgrounds
  for(let i=0;i<totalCols;i++){
    const cb=document.createElement('div'); cb.className='col-bg';
    cb.style.left=(i/totalCols*100)+'%';
    cb.style.width=(1/totalCols*100)+'%';
    grid.appendChild(cb);
  }

  // Today line
  if(now.getFullYear()===currentYear){
    const tl=document.createElement('div'); tl.className='today-line';
    tl.style.left=(todayRatio(currentYear)*100)+'%';
    grid.appendChild(tl);
  }

  // Bar
  const startRatio=dateToRatio(task.start,currentYear);
  const endRatio=dateToRatio(task.end,currentYear);
  if(endRatio>0 && startRatio<1){
    const l=Math.max(0,startRatio)*100;
    const w=(Math.min(1,endRatio)-Math.max(0,startRatio))*100;
    if(w>0){
      const bar=document.createElement('div'); bar.className='gantt-bar';
      bar.style.cssText=`left:${l}%;width:${w}%;background:${task.color};`;
      bar.dataset.taskId=task.id;

      // Progress overlay
      if(task.progress>0){
        const prog=document.createElement('div'); prog.className='bar-progress';
        prog.style.cssText=`left:8px;width:calc(${task.progress}% - 16px);`;
        bar.appendChild(prog);
      }

      // Label
      const bl=document.createElement('div'); bl.className='bar-label'; bl.textContent=task.name;
      bar.appendChild(bl);

      // Handles
      const hl=document.createElement('div'); hl.className='bar-handle bar-handle-left'; bar.appendChild(hl);
      const hr2=document.createElement('div'); hr2.className='bar-handle bar-handle-right'; bar.appendChild(hr2);

      // Drag
      setupBarDrag(bar, task, grid);

      // Right-click
      bar.addEventListener('contextmenu',e=>{ e.preventDefault(); showCtxMenu(e, task.id); });
      // Dbl-click edit
      bar.addEventListener('dblclick',e=>{ e.stopPropagation(); openEditTask(task.id); });

      grid.appendChild(bar);
    }
  }

  // Click on grid to create
  grid.addEventListener('click', e=>{
    if(e.target!==grid && !e.target.classList.contains('col-bg') && !e.target.classList.contains('today-line')) return;
    const rect=grid.getBoundingClientRect();
    const ratio=(e.clientX-rect.left)/rect.width;
    const d=dateFromRatio(ratio,currentYear);
    openAddTaskInCat(task.cat, d);
  });

  tr.appendChild(grid);
  return tr;
}

// ─── DRAG ────────────────────────────────────────────────────
function setupBarDrag(bar, task, grid){
  bar.addEventListener('mousedown',e=>{
    if(e.button!==0) return;
    const isLeft=e.target.classList.contains('bar-handle-left');
    const isRight=e.target.classList.contains('bar-handle-right');
    const mode=isLeft?'resize-left':isRight?'resize-right':'move';
    const rect=grid.getBoundingClientRect();
    const startX=e.clientX;
    const startStart=task.start; const startEnd=task.end;
    bar.classList.add('dragging');
    e.preventDefault();

    function onMove(ev){
      const dx=(ev.clientX-startX)/rect.width;
      const totalDays=daysInYear(currentYear);
      const dDays=Math.round(dx*totalDays);
      if(mode==='move'){
        const s=addDays(startStart,dDays); const en=addDays(startEnd,dDays);
        task.start=s; task.end=en;
        const sl=dateToRatio(s,currentYear)*100;
        const sw=(dateToRatio(en,currentYear)-dateToRatio(s,currentYear))*100;
        bar.style.left=Math.max(0,sl)+'%'; bar.style.width=Math.max(.5,sw)+'%';
      } else if(mode==='resize-left'){
        const s=addDays(startStart,dDays);
        if(s<task.end){ task.start=s;
          const sl=dateToRatio(s,currentYear)*100;
          const sw=(dateToRatio(task.end,currentYear)-Math.max(0,dateToRatio(s,currentYear)))*100;
          bar.style.left=Math.max(0,sl)+'%'; bar.style.width=Math.max(.5,sw)+'%';
        }
      } else {
        const en=addDays(startEnd,dDays);
        if(en>task.start){ task.end=en;
          const sw=(dateToRatio(en,currentYear)-dateToRatio(task.start,currentYear))*100;
          bar.style.width=Math.max(.5,sw)+'%';
        }
      }
    }
    function onUp(){ bar.classList.remove('dragging'); document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); }
    document.addEventListener('mousemove',onMove);
    document.addEventListener('mouseup',onUp);
  });
}

function addDays(dateStr,days){
  const d=new Date(dateStr+'T00:00:00'); d.setDate(d.getDate()+days);
  return d.toISOString().split('T')[0];
}

// FIREBASE SYNC — GANTT
// ════════════════════════════════════════════════
const COL='plazma', DOC_ID='gantt';

function getState(){ return{categories,tasks,currentYear,taskIdCounter,catIdCounter}; }
function applyState(s){
  if(s.categories)   categories     = s.categories;
  if(s.tasks)        tasks          = s.tasks;
  if(s.currentYear)  currentYear    = s.currentYear;
  if(s.taskIdCounter!==undefined) taskIdCounter = s.taskIdCounter;
  if(s.catIdCounter!==undefined)  catIdCounter  = s.catIdCounter;
}
function setSyncState(state,text,time=''){
  const dot=document.getElementById('syncDot'),txt=document.getElementById('syncText'),tim=document.getElementById('syncTime');
  if(!dot)return;
  dot.className='sync-dot '+state;
  txt.textContent=text;
  txt.style.color=state==='connected'?'#22c55e':state==='syncing'?'#f59e0b':state==='error'?'#ef4444':'var(--text3)';
  tim.textContent=time;
}
function hideLoading(){const ls=document.getElementById('loadingScreen');if(ls){ls.classList.add('hidden');setTimeout(()=>ls.style.display='none',500);}}
function save(){
  setSyncState('syncing','Sauvegarde…');
  db.collection(COL).doc(DOC_ID).set(getState())
    .then(()=>{setSyncState('connected','Synchronisé');flashSave(true);})
    .catch(e=>{setSyncState('error','Erreur Firebase');flashSave(false);console.error(e);});
}
function startSync(){
  setSyncState('syncing','Connexion…');
  db.collection(COL).doc(DOC_ID).onSnapshot(doc=>{
    if(doc.metadata.hasPendingWrites)return;
    if(doc.exists){applyState(doc.data());render();const now=new Date();setSyncState('connected','Synchronisé',now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}));}
    else{setSyncState('connected','Prêt','');}
    hideLoading();
  },err=>{console.error(err);setSyncState('error','Erreur connexion');hideLoading();});
}
function flashSave(ok){
  const btn=document.getElementById('saveFbBtn');if(!btn)return;
  btn.classList.add('saved');btn.textContent=ok?'✓ Sauvegardé':'⚠ Erreur';if(!ok)btn.style.color='#ef4444';
  setTimeout(()=>{btn.classList.remove('saved');btn.textContent='💾 Sauvegarder';btn.style.color='';},1600);
}
function exportBackup(){
  const b=new Blob([JSON.stringify(getState(),null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='plazma-gantt-backup-'+new Date().toISOString().split('T')[0]+'.json';a.click();
}
function importBackup(){
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.addEventListener('change',async()=>{try{applyState(JSON.parse(await input.files[0].text()));save();render();}catch(e){alert('Fichier invalide');}});
  input.click();
}
function resetData(){if(!confirm('Réinitialiser le Gantt ?'))return;db.collection(COL).doc(DOC_ID).delete().then(()=>location.reload());}

startSync();
setTimeout(()=>{const ls=document.getElementById('loadingScreen');if(ls&&!ls.classList.contains('hidden')){hideLoading();setSyncState('error','Firebase inaccessible');render();}},8000);

</script>
