<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHI — Équipe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/theme.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  .content{max-width:var(--page-max);margin:0 auto;padding:24px var(--gut) 80px}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px}
  .page-head .eyebrow{margin-bottom:4px}
  .actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

  .style-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px}
  .style-grid textarea{min-height:112px}
  .style-grid .panel h3{font-size:13px;margin-bottom:10px;color:var(--dim)}

  .pools{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .pool{border-top:3px solid var(--role,var(--accent))}
  .pool-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .pool-row{display:grid;grid-template-columns:1fr 96px 1fr 30px;gap:7px;align-items:center;margin-bottom:7px}
  .pool-row input{padding:8px 10px;font-size:13px}
  .pool-row select{padding:8px 8px;font-size:12px}
  .row-del{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;height:34px;cursor:pointer;font-size:13px}
  .row-del:hover{color:var(--err);border-color:rgba(239,68,68,.4)}
  .tier-S{color:var(--top)}.tier-A{color:var(--jungle)}.tier-B{color:var(--mid)}.tier-Flex{color:var(--muted)}
  .add-row{width:100%;margin-top:4px;background:none;border:1px dashed var(--border);color:var(--muted);
    border-radius:8px;padding:8px;cursor:pointer;font-family:var(--font);font-size:13px}
  .add-row:hover{border-color:var(--accent);color:var(--accent)}

  @media(max-width:760px){.style-grid,.pools{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="loader"><div class="loader-mark">ARCHI</div><div class="loader-bar"></div></div>
<div id="nav"></div>

<div class="content" id="capture">
  <div class="page-head">
    <div>
      <div class="eyebrow">PlaZma Esport</div>
      <h1>Identité d'équipe</h1>
    </div>
    <div class="actions" data-noexport>
      <span class="sync-pill">
        <span class="sync-dot offline" id="syncDot"></span>
        <span id="syncText">En attente…</span>
        <span class="sync-time" id="syncTime"></span>
      </span>
      <button class="btn btn-sm" id="exportBtn">⬇ PNG</button>
      <button class="btn btn-sm btn-danger" id="resetBtn">Reset</button>
    </div>
  </div>

  <!-- STYLE DE JEU -->
  <div class="style-grid">
    <div class="panel"><h3>Style de jeu global</h3>
      <textarea data-style="identity" placeholder="Tempo, prise d'espace, macro, drafts privilégiées…"></textarea></div>
    <div class="panel"><h3>Win conditions</h3>
      <textarea data-style="winconds" placeholder="Comment on gagne nos parties…"></textarea></div>
    <div class="panel"><h3>Points forts</h3>
      <textarea data-style="forces" placeholder="Nos atouts collectifs…"></textarea></div>
    <div class="panel"><h3>À travailler</h3>
      <textarea data-style="faiblesses" placeholder="Nos axes de progression…"></textarea></div>
  </div>

  <!-- TIER LIST / POOLS -->
  <div class="sec-head" style="display:flex;align-items:baseline;gap:12px;margin:8px 0 16px">
    <h2 style="font-family:var(--font-display);font-size:15px">Tier list par rôle</h2>
    <span style="flex:1;height:1px;background:var(--border)"></span>
  </div>
  <div class="pools" id="pools"></div>
</div>

<script src="assets/plazma.js"></script>
<script>
PZ.mountNav('team', '#nav');

const ROLES = [
  { key:'top',     label:'Top',     color:'var(--top)' },
  { key:'jungle',  label:'Jungle',  color:'var(--jungle)' },
  { key:'mid',     label:'Mid',     color:'var(--mid)' },
  { key:'adc',     label:'ADC',     color:'var(--adc)' },
  { key:'support', label:'Support', color:'var(--support)' },
];
const TIERS = ['S','A','B','Flex'];

let state = {
  style: { identity:'', winconds:'', forces:'', faiblesses:'' },
  pools: { top:[], jungle:[], mid:[], adc:[], support:[] }
};

function getState(){ return state; }
function applyState(d){
  state.style = Object.assign({ identity:'',winconds:'',forces:'',faiblesses:'' }, d.style || {});
  state.pools = Object.assign({ top:[],jungle:[],mid:[],adc:[],support:[] }, d.pools || {});
}

const sync = PZ.sync({ docId:'team-identity', getState, applyState, onData:render });

let saveTimer = null;
function queueSave(){ clearTimeout(saveTimer); saveTimer = setTimeout(()=>sync.save(), 500); }

function esc(s){ return (s||'').replace(/"/g,'&quot;'); }

function render(){
  // style textareas (ne pas écraser le champ en cours d'édition)
  document.querySelectorAll('[data-style]').forEach(t=>{
    if (document.activeElement !== t) t.value = state.style[t.dataset.style] || '';
  });
  // pools
  const host = document.getElementById('pools');
  host.innerHTML = '';
  ROLES.forEach(r=>{
    const rows = state.pools[r.key] || (state.pools[r.key] = []);
    const card = document.createElement('div');
    card.className = 'panel pool';
    card.style.setProperty('--role', r.color);
    card.innerHTML = `<div class="pool-head">
        <span class="role-badge" style="--role:${r.color}">${r.label}</span>
        <span class="muted" style="font-size:12px">${rows.length} champ${rows.length>1?'s':''}</span>
      </div>`;
    rows.forEach((row,i)=>{
      const el = document.createElement('div');
      el.className = 'pool-row';
      el.innerHTML = `
        <input value="${esc(row.champ)}" placeholder="Champion" data-f="champ">
        <select data-f="tier" class="tier-${row.tier||'A'}">${TIERS.map(t=>`<option${t===(row.tier||'A')?' selected':''}>${t}</option>`).join('')}</select>
        <input value="${esc(row.note)}" placeholder="Note (match-up, condition…)" data-f="note">
        <button class="row-del" title="Supprimer">✕</button>`;
      el.querySelectorAll('[data-f]').forEach(f=>{
        f.addEventListener('input', ()=>{ row[f.dataset.f] = f.value; if(f.dataset.f==='tier') f.className='tier-'+f.value; queueSave(); });
      });
      el.querySelector('.row-del').addEventListener('click', ()=>{ rows.splice(i,1); render(); sync.save(); });
      card.appendChild(el);
    });
    const add = document.createElement('button');
    add.className = 'add-row'; add.textContent = '+ Ajouter un champion';
    add.addEventListener('click', ()=>{ rows.push({champ:'',tier:'A',note:''}); render(); });
    card.appendChild(add);
    host.appendChild(card);
  });
}

// style textareas -> state
document.querySelectorAll('[data-style]').forEach(t=>{
  t.addEventListener('input', ()=>{ state.style[t.dataset.style] = t.value; queueSave(); });
});

document.getElementById('exportBtn').addEventListener('click', ()=>PZ.exportPNG(document.getElementById('capture'),'archi-equipe'));
document.getElementById('resetBtn').addEventListener('click', ()=>sync.reset('Réinitialiser l\'identité d\'équipe ?'));

render();
</script>
</body>
</html>
