<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHI — Planning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/theme.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  .content{max-width:1180px;margin:0 auto;padding:22px var(--gut) 80px}
  .toolbar{justify-content:space-between}
  .week-nav{display:flex;align-items:center;gap:6px}
  .week-nav input[type=week]{width:auto}
  .btn-wk{width:34px;height:34px;padding:0}
  .actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

  .card-head .wk-label{font-family:var(--font-mono);color:var(--accent);font-weight:600;font-size:15px}

  /* Résumé de la semaine */
  .week-summary{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:13px 22px;border-bottom:1px solid var(--border)}
  .ws-total{font-size:12.5px;color:var(--dim);font-weight:500;margin-right:6px}
  .ws-total b{color:var(--text);font-weight:700}
  .ws-chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;
    padding:3px 10px;border-radius:20px;color:var(--wc);background:color-mix(in srgb,var(--wc) 14%,transparent)}
  .ws-chip .n{font-variant-numeric:tabular-nums}
  .ws-empty{font-size:12.5px;color:var(--muted);padding:13px 22px;border-bottom:1px solid var(--border)}

  /* Menus déroulants (barre d'outils) */
  .menu{position:relative;display:inline-block}
  .menu-list{position:absolute;right:0;top:calc(100% + 6px);z-index:40;min-width:236px;
    background:var(--elevated);border:1px solid var(--border);border-radius:11px;padding:6px;
    box-shadow:0 14px 36px -14px rgba(0,0,0,.55);display:none;flex-direction:column;gap:2px}
  .menu.open .menu-list{display:flex}
  .menu-item{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:none;border:0;
    color:var(--dim);font-family:var(--font);font-size:13px;padding:8px 10px;border-radius:7px;cursor:pointer}
  .menu-item:hover{background:var(--surface-2);color:var(--text)}
  .menu-item.danger:hover{color:var(--err)}
  .menu-sep{height:1px;background:var(--border);margin:5px 4px}
  .menu-label{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:6px 10px 3px}
  .tmpl-del{margin-left:auto;padding:0 4px;border-radius:5px;opacity:.55;font-size:12px}
  .tmpl-del:hover{opacity:1;color:var(--err);background:color-mix(in srgb,var(--err) 14%,transparent)}

  .grid{display:grid;grid-template-columns:repeat(7,1fr)}
  .day{padding:12px 10px;border-right:1px solid var(--border);min-height:190px}
  .day:last-child{border-right:none}
  .day.today{background:color-mix(in srgb,var(--accent) 6%,transparent)}
  .day.today .day-name{color:var(--accent)}
  .day.today .day-name::after{content:" · auj.";font-weight:700}
  .day-name{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .slot{position:relative;padding:9px 10px;margin-bottom:6px;border-radius:8px;cursor:pointer;
    background:var(--surface-2);border:1px solid var(--border);border-left:3px solid var(--sc,var(--accent));transition:background .12s}
  .slot:hover{background:var(--elevated)}
  .slot-type{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
    padding:2px 7px;border-radius:5px;margin-bottom:5px;color:var(--sc);background:color-mix(in srgb,var(--sc) 15%,transparent)}
  .slot-time{font-size:11px;color:var(--muted);margin-bottom:2px}
  .slot-note{font-size:12.5px;color:var(--dim);line-height:1.4}
  .slot-del{position:absolute;top:5px;right:6px;background:none;border:none;color:var(--muted);cursor:pointer;
    font-size:11px;opacity:0;transition:opacity .12s}
  .slot:hover .slot-del{opacity:1}
  .slot-del:hover{color:var(--err)}
  .add-slot{width:100%;margin-top:2px;background:none;border:1px dashed var(--border);color:var(--muted);
    border-radius:7px;padding:6px;cursor:pointer;font-family:var(--font)}
  .add-slot:hover{border-color:var(--accent);color:var(--accent)}

  .legend{display:flex;flex-wrap:wrap;gap:7px;padding:14px 22px;border-top:1px solid var(--border)}
  .leg{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 9px;border-radius:5px}

  @media(max-width:1000px){.grid{grid-template-columns:1fr}.day{border-right:none;border-bottom:1px solid var(--border);min-height:auto}}
</style>
</head>
<body>

<div class="loader"><div class="loader-mark">ARCHI</div><div class="loader-bar"></div></div>
<div id="nav"></div>

<div class="content">
  <div class="toolbar">
    <div class="week-nav">
      <button class="btn btn-wk" id="prevWk" title="Semaine précédente">‹</button>
      <input type="week" id="weekPicker">
      <button class="btn btn-wk" id="nextWk" title="Semaine suivante">›</button>
      <button class="btn btn-sm" id="todayBtn">Aujourd'hui</button>
    </div>
    <div class="actions">
      <span class="sync-pill">
        <span class="sync-dot offline" id="syncDot"></span>
        <span id="syncText">En attente…</span>
        <span class="sync-time" id="syncTime"></span>
      </span>
      <div class="menu" id="fillMenu">
        <button class="btn btn-sm" id="fillBtn">✎ Pré-remplir ▾</button>
        <div class="menu-list" id="fillList"></div>
      </div>
      <div class="menu" id="moreMenu">
        <button class="btn btn-sm" id="moreBtn" title="Plus d'actions">⋯</button>
        <div class="menu-list">
          <button class="menu-item" id="exportBtn">⬇ Exporter en PNG</button>
          <button class="menu-item" id="backupBtn">Sauvegarder (JSON)</button>
          <button class="menu-item" id="importBtn">Importer (JSON)</button>
          <div class="menu-sep"></div>
          <button class="menu-item danger" id="resetBtn">Réinitialiser la semaine</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card" id="capture">
    <div class="card-head">
      <div>
        <div class="eyebrow">PlaZma Esport · Planning</div>
        <div class="card-title">Programme d'entraînement</div>
      </div>
      <div class="wk-label" id="weekLabel">—</div>
    </div>
    <div id="summary"></div>
    <div class="grid" id="grid"></div>
    <div class="legend" id="legend"></div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Modifier le créneau</div>
    <div class="field"><label>Type de session</label><select id="mType"></select></div>
    <div class="field" style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div><label>Début</label><input type="time" id="mStart"></div>
      <div><label>Fin</label><input type="time" id="mEnd"></div>
    </div>
    <div class="field"><label>Note</label><input type="text" id="mNote" placeholder="ex : Scrims vs Team X"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancelBtn">Annuler</button>
      <button class="btn btn-primary" id="saveSlotBtn">Sauvegarder</button>
    </div>
  </div>
</div>

<script src="assets/plazma.js" data-section="planning"></script>
<script>
PZ.mountNav('schedule', '#nav');
const db = PZ.db;

const DAYS = ["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
const TYPES = [
  { id:"scrim",    label:"Scrim",          color:"#3b82f6" },
  { id:"soloq",    label:"SoloQ",          color:"#ef4444" },
  { id:"repos",    label:"Repos",          color:"#22c55e" },
  { id:"match",    label:"Match Offi",     color:"#f97316" },
  { id:"coaching", label:"Coaching Indiv", color:"#ec4899" },
  { id:"review",   label:"Review VOD",     color:"#a855f7" },
  { id:"flexq",    label:"FlexQ",          color:"#f59e0b" },
  { id:"atelier",  label:"Atelier",        color:"#2dd4bf" },
  { id:"autre",    label:"Autre",          color:"#94a3b8" },
];
const getType = id => TYPES.find(t => t.id === id) || TYPES[8];

const escHtml = s => String(s==null?'':s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const escAttr = s => String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// Durées (gère les sessions qui passent minuit, ex : 22:00 → 00:30).
const parseHM = t => (/^\d{1,2}:\d{2}$/.test(t||'') ? (+t.split(':')[0])*60 + (+t.split(':')[1]) : null);
function slotDurationMin(s){ const a=parseHM(s.start), b=parseHM(s.end); if(a==null||b==null) return null; let d=b-a; if(d<0) d+=1440; return d; }
function fmtDur(min){ if(!min||min<=0) return ''; const h=Math.floor(min/60), m=min%60; return h ? (m?`${h}h${String(m).padStart(2,'0')}`:`${h}h`) : `${m}min`; }

// Compat : anciens créneaux stockés en `time` texte ; nouveaux en start/end.
const slotStartKey = s => s.start || s.time || '~';           // vide → trié en dernier
function slotTimeText(s){
  if(!s.start) return s.time || '';
  let t = s.start + (s.end ? ' – ' + s.end : '');
  const d = slotDurationMin(s); if(d) t += ' · ' + fmtDur(d);
  const a=parseHM(s.start), b=parseHM(s.end); if(a!=null && b!=null && b<a) t += ' (+1j)';
  return t;
}

let schedule = {};
let templates = {};

// ---- Semaine ----
function getWeekNum(d){ d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())); const day=d.getUTCDay()||7; d.setUTCDate(d.getUTCDate()+4-day); const y1=new Date(Date.UTC(d.getUTCFullYear(),0,1)); return Math.ceil((((d-y1)/86400000)+1)/7); }
function currentWeekValue(){ const n=new Date(); return `${n.getFullYear()}-W${String(getWeekNum(n)).padStart(2,'0')}`; }
function weekLabel(val){ const [yr,wk]=val.split('-W').map(Number); if(!yr||!wk)return val; const base=new Date(yr,0,1+(wk-1)*7); const day=base.getDay(); const mon=new Date(base); mon.setDate(base.getDate()-(day===0?6:day-1)); const sun=new Date(mon); sun.setDate(mon.getDate()+6); const fmt=d=>d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}); return `S${wk} · ${fmt(mon)} – ${fmt(sun)} ${yr}`; }
function weekValueShifted(val, delta){
  const [yr,wk]=(val||currentWeekValue()).split('-W').map(Number);
  const base=new Date(yr,0,1+(wk-1)*7); const day=base.getDay();
  const mon=new Date(base); mon.setDate(base.getDate()-(day===0?6:day-1)); mon.setDate(mon.getDate()+delta*7);
  return `${mon.getFullYear()}-W${String(getWeekNum(mon)).padStart(2,'0')}`;
}
const todayIdx = () => { const d=new Date().getDay(); return d===0?6:d-1; };  // Lundi = 0

const picker = document.getElementById('weekPicker');
picker.value = currentWeekValue();
document.getElementById('weekLabel').textContent = weekLabel(picker.value);

// ---- Sync ----
const sync = PZ.sync({
  docId: () => 'schedule-' + (picker.value || 'default'),
  getState: () => ({ schedule }),
  applyState: s => { schedule = (s && s.schedule) || {}; },
  onData: renderGrid
});

// ---- Render ----
function renderGrid(){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const isCurrentWeek = picker.value === currentWeekValue();
  const ti = todayIdx();
  DAYS.forEach((day, di) => {
    const slots = schedule[day] || [];
    slots.sort((a,b) => slotStartKey(a).localeCompare(slotStartKey(b)));   // tri par heure de début
    const col = document.createElement('div');
    col.className = 'day' + (isCurrentWeek && di===ti ? ' today' : '');
    col.innerHTML = `<div class="day-name">${day}</div>`;
    slots.forEach((slot, idx) => {
      const t = getType(slot.type);
      const time = slotTimeText(slot);
      const el = document.createElement('div');
      el.className = 'slot';
      el.style.setProperty('--sc', t.color);
      el.innerHTML = `<button class="slot-del" data-noexport title="Supprimer">✕</button>
        <span class="slot-type">${t.label}</span>
        ${time ? `<div class="slot-time">⏱ ${time}</div>` : ''}
        ${slot.note ? `<div class="slot-note">${escHtml(slot.note)}</div>` : ''}`;
      el.addEventListener('click', e => { if(!e.target.classList.contains('slot-del')) openModal(day, idx); });
      el.querySelector('.slot-del').addEventListener('click', e => { e.stopPropagation(); schedule[day].splice(idx,1); renderGrid(); sync.save(); });
      col.appendChild(el);
    });
    const add = document.createElement('button');
    add.className = 'add-slot'; add.textContent = '+'; add.setAttribute('data-noexport','');
    add.addEventListener('click', () => openModal(day, null));
    col.appendChild(add);
    grid.appendChild(col);
  });
  renderSummary();
  document.getElementById('legend').innerHTML = TYPES.map(t =>
    `<span class="leg" style="color:${t.color};background:${t.color}22">${t.label}</span>`).join('');
}

// ---- Résumé de la semaine ----
function renderSummary(){
  const el = document.getElementById('summary');
  let sessions=0, totalMin=0; const per={};
  DAYS.forEach(d => (schedule[d]||[]).forEach(s => {
    sessions++;
    const m = slotDurationMin(s) || 0; totalMin += m;
    const k = s.type || 'autre'; per[k] = per[k] || {n:0,min:0}; per[k].n++; per[k].min += m;
  }));
  if(!sessions){
    el.className = 'ws-empty';
    el.textContent = 'Aucune session cette semaine — « Pré-remplir » permet de copier la semaine précédente ou d\'appliquer un modèle.';
    return;
  }
  el.className = 'week-summary';
  let html = `<span class="ws-total"><b>${sessions}</b> session${sessions>1?'s':''}${totalMin?` · <b>${fmtDur(totalMin)}</b>`:''}</span>`;
  html += TYPES.filter(t => per[t.id]).map(t => {
    const p = per[t.id];
    return `<span class="ws-chip" style="--wc:${t.color}"><span class="n">${p.n}</span> ${t.label}${p.min?` · ${fmtDur(p.min)}`:''}</span>`;
  }).join('');
  el.innerHTML = html;
}

// ---- Modal ----
let _mDay, _mIdx, _mNew;
function openModal(day, idx){
  _mDay = day; _mNew = (idx == null); _mIdx = idx;
  const s = _mNew ? {type:'scrim',start:'',end:'',note:''} : schedule[day][idx];
  document.getElementById('modalTitle').textContent = (_mNew ? 'Nouveau créneau · ' : 'Créneau · ') + day;
  document.getElementById('mStart').value = s.start || '';
  document.getElementById('mEnd').value = s.end || '';
  document.getElementById('mNote').value = s.note || '';
  document.getElementById('mType').innerHTML = TYPES.map(t => `<option value="${t.id}"${t.id===s.type?' selected':''}>${t.label}</option>`).join('');
  document.getElementById('overlay').classList.add('open');
}
const closeModal = () => document.getElementById('overlay').classList.remove('open');
document.getElementById('cancelBtn').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', e => { if(e.target.id==='overlay') closeModal(); });
document.addEventListener('keydown', e => { if(e.key==='Escape'){ closeModal(); closeMenus(); } });
document.getElementById('saveSlotBtn').addEventListener('click', () => {
  const start = document.getElementById('mStart').value;
  const end   = document.getElementById('mEnd').value;
  if(start && end && parseHM(start)!=null && parseHM(end)!=null && parseHM(start)===parseHM(end)){
    alert('L\'heure de fin doit être différente de l\'heure de début.'); return;
  }
  const slot = { type: document.getElementById('mType').value, start, end, note: document.getElementById('mNote').value };
  if(_mNew) (schedule[_mDay] = schedule[_mDay] || []).push(slot);
  else schedule[_mDay][_mIdx] = slot;
  closeModal(); renderGrid(); sync.save();
});

// ---- Navigation semaine ----
function shiftWeek(delta){ picker.value = weekValueShifted(picker.value, delta); picker.dispatchEvent(new Event('change')); }
document.getElementById('prevWk').addEventListener('click', () => shiftWeek(-1));
document.getElementById('nextWk').addEventListener('click', () => shiftWeek(1));
document.getElementById('todayBtn').addEventListener('click', () => { picker.value=currentWeekValue(); picker.dispatchEvent(new Event('change')); });
picker.addEventListener('change', () => { document.getElementById('weekLabel').textContent = weekLabel(picker.value); schedule={}; renderGrid(); sync.restart(); });

// ---- Menus déroulants ----
function closeMenus(){ document.querySelectorAll('.menu.open').forEach(m => m.classList.remove('open')); }
function toggleMenu(id){ const m=document.getElementById(id); const was=m.classList.contains('open'); closeMenus(); if(!was) m.classList.add('open'); }
document.getElementById('fillBtn').addEventListener('click', e => { e.stopPropagation(); toggleMenu('fillMenu'); });
document.getElementById('moreBtn').addEventListener('click', e => { e.stopPropagation(); toggleMenu('moreMenu'); });
document.addEventListener('click', closeMenus);

// ---- Pré-remplir : copie de semaine + modèles ----
function renderFillMenu(){
  const names = Object.keys(templates).sort((a,b)=>a.localeCompare(b,'fr'));
  let html = `<button class="menu-item" data-act="copyprev">📋 Copier la semaine précédente</button>`;
  if(names.length){
    html += `<div class="menu-sep"></div><div class="menu-label">Appliquer un modèle</div>`;
    html += names.map(n => `<button class="menu-item" data-act="apply" data-name="${escAttr(n)}">▸ ${escHtml(n)}<span class="tmpl-del" data-act="deltmpl" data-name="${escAttr(n)}" title="Supprimer ce modèle">✕</span></button>`).join('');
  }
  html += `<div class="menu-sep"></div><button class="menu-item" data-act="savetmpl">➕ Enregistrer la semaine comme modèle…</button>`;
  document.getElementById('fillList').innerHTML = html;
}
document.getElementById('fillList').addEventListener('click', e => {
  const el = e.target.closest('[data-act]'); if(!el) return;
  const act = el.dataset.act;
  if(act==='deltmpl'){ e.stopPropagation(); deleteTemplate(el.dataset.name); return; }
  closeMenus();
  if(act==='copyprev') copyPrevWeek();
  else if(act==='apply') applyTemplate(el.dataset.name);
  else if(act==='savetmpl') saveCurrentAsTemplate();
});

const hasSessions = obj => Object.values(obj||{}).some(a => a && a.length);

async function copyPrevWeek(){
  if(!db){ alert('Firebase indisponible.'); return; }
  const prev = weekValueShifted(picker.value, -1);
  let sched = {};
  try{ const s = await db.collection(PZ.COLLECTION).doc('schedule-'+prev).get(); sched = (s.exists && s.data().schedule) || {}; }
  catch(e){ console.error(e); alert('Lecture de la semaine précédente impossible.'); return; }
  if(!hasSessions(sched)){ alert('La semaine précédente est vide, rien à copier.'); return; }
  if(!confirm('Remplacer le planning de cette semaine par une copie de la semaine précédente ?')) return;
  schedule = JSON.parse(JSON.stringify(sched)); renderGrid(); sync.save();
}

// Modèles stockés dans plazma/schedule-templates : { templates: { nom: {schedule} } }
async function loadTemplates(){
  if(!db) return;
  try{ const s = await db.collection(PZ.COLLECTION).doc('schedule-templates').get(); templates = (s.exists && s.data().templates) || {}; }
  catch(e){ console.error(e); templates = {}; }
  renderFillMenu();
}
async function persistTemplates(){
  if(!db) return;
  try{ await db.collection(PZ.COLLECTION).doc('schedule-templates').set({ templates }); }
  catch(e){ console.error(e); alert('Enregistrement du modèle impossible.'); }
}
async function saveCurrentAsTemplate(){
  if(!hasSessions(schedule)){ alert('La semaine est vide : ajoute des créneaux avant d\'en faire un modèle.'); return; }
  const name = (prompt('Nom du modèle (ex : Semaine type) :') || '').trim();
  if(!name) return;
  templates[name] = JSON.parse(JSON.stringify(schedule));
  await persistTemplates(); renderFillMenu();
}
async function applyTemplate(name){
  const t = templates[name]; if(!t) return;
  if(!confirm(`Remplacer le planning de cette semaine par le modèle « ${name} » ?`)) return;
  schedule = JSON.parse(JSON.stringify(t)); renderGrid(); sync.save();
}
async function deleteTemplate(name){
  if(!confirm(`Supprimer le modèle « ${name} » ?`)) return;
  delete templates[name]; await persistTemplates(); renderFillMenu();
}

// ---- Actions (menu ⋯) ----
document.getElementById('exportBtn').addEventListener('click', () => PZ.exportPNG(document.getElementById('capture'), 'archi-planning-'+picker.value));
document.getElementById('backupBtn').addEventListener('click', () => PZ.backup({schedule}, 'archi-planning-'+picker.value));
document.getElementById('importBtn').addEventListener('click', () => PZ.importFile(d => { schedule=(d&&d.schedule)||{}; renderGrid(); sync.save(); }));
document.getElementById('resetBtn').addEventListener('click', () => sync.reset('Effacer le planning de cette semaine ?'));

renderFillMenu();
loadTemplates();
renderGrid();
</script>
</body>
</html>
