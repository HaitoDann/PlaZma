<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHI — Compte rendu scrim</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/theme.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  .content{max-width:960px;margin:0 auto;padding:22px var(--gut) 80px}
  .toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;margin-bottom:8px}
  .session-chip{display:inline-flex;align-items:center;gap:6px;background:var(--surface-2);border:1px solid var(--border);
    border-radius:999px;padding:5px 12px;font-size:12px;color:var(--dim);margin-bottom:14px}

  .scrim-head{border-top:3px solid var(--accent);padding:20px 22px;border-bottom:1px solid var(--border)}
  .meta{display:grid;grid-template-columns:200px 1fr;gap:14px;padding:16px 22px;border-bottom:1px solid var(--border)}

  .score{display:flex;align-items:center;justify-content:center;gap:26px;padding:20px;border-bottom:1px solid var(--border)}
  .score-team{display:flex;flex-direction:column;align-items:center;gap:6px}
  .score-team small{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .score-num{width:90px;text-align:center;font-family:var(--font-display);font-size:3.2rem;font-weight:700;
    background:transparent;border:none;border-bottom:2px solid var(--border-2);border-radius:0;padding:0}
  .score-num:focus{box-shadow:none;border-bottom-color:var(--accent)}
  .score-vs{font-family:var(--font-display);font-size:1.2rem;color:var(--muted);margin-top:22px}

  .body{padding:22px;display:flex;flex-direction:column;gap:24px}
  .sec-title{font-family:var(--font-display);font-size:14px;font-weight:600;padding-bottom:10px;
    border-bottom:1px solid var(--border);margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .sec-title .d{width:7px;height:7px;border-radius:50%}

  .game{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:9px}
  .game-top{display:flex;align-items:center;gap:14px;padding:10px 14px;border-bottom:1px solid var(--border)}
  .game-num{font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--muted);min-width:30px}
  .game-top select{max-width:150px}
  .errs{padding:12px 14px}
  .errs-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
  .errs-head .lbl{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .err-row{display:grid;grid-template-columns:70px 130px 1fr 30px;gap:8px;align-items:center;margin-bottom:6px}
  .err-row input,.err-row select{padding:7px 9px;font-size:13px}
  .err-del{background:none;border:1px solid var(--border);border-radius:7px;height:34px;color:var(--muted);cursor:pointer}
  .err-del:hover{color:var(--err);border-color:rgba(239,68,68,.4)}
  .no-err{font-size:12px;color:var(--muted);font-style:italic}

  .ana-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .ana{background:var(--surface-2);border:1px solid var(--border);border-left:3px solid var(--ac,var(--border));border-radius:8px;padding:14px}
  .ana .t{font-size:12px;font-weight:600;margin-bottom:8px;color:var(--ac,var(--dim))}
  .ana textarea{background:transparent;border:none;padding:0;min-height:96px;font-size:13px;color:var(--dim)}
  .ana textarea:focus{box-shadow:none}

  .players{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}
  .pcard{background:var(--surface-2);border:1px solid var(--border);border-top:3px solid var(--role);border-radius:8px;overflow:hidden}
  .pcard .h{display:flex;align-items:center;gap:7px;padding:9px 11px;border-bottom:1px solid var(--border)}
  .pcard .h .n{font-family:var(--font-display);font-weight:600;font-size:14px}
  .pcard .h .r{font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
  .pcard textarea{background:transparent;border:none;border-radius:0;padding:10px 11px;min-height:90px;font-size:12px;color:var(--dim)}
  .pcard textarea:focus{box-shadow:none}

  .bilan{display:flex;align-items:center;gap:22px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:18px 22px;flex-wrap:wrap}
  .bilan-num{display:flex;align-items:baseline;gap:6px}
  .bilan-num input{width:78px;text-align:center;font-family:var(--font-display);font-size:2.6rem;font-weight:700;color:var(--accent);
    background:transparent;border:none;border-bottom:2px solid var(--border-2);border-radius:0;padding:0}
  .bilan-num input:focus{box-shadow:none;border-bottom-color:var(--accent)}
  .bilan-over{font-family:var(--font-display);font-size:1.3rem;color:var(--muted)}
  .bilan-right{flex:1;min-width:240px}

  .foot{border-top:1px solid var(--border);padding:12px 22px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
  .foot .brand{font-size:12px;color:var(--muted)}

  /* Drawer historique */
  .drawer-ov{position:fixed;inset:0;background:rgba(6,10,14,.6);backdrop-filter:blur(4px);z-index:180;opacity:0;pointer-events:none;transition:opacity .2s}
  .drawer-ov.open{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:380px;max-width:94vw;background:var(--surface);border-left:1px solid var(--border-2);
    z-index:181;transform:translateX(100%);transition:transform .25s;display:flex;flex-direction:column}
  .drawer.open{transform:none}
  .drawer-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border)}
  .drawer-list{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px}
  .sess{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:border-color .15s}
  .sess:hover{border-color:var(--border-2)}
  .sess.active{border-color:var(--accent)}
  .sess-main{display:flex;gap:11px;padding:12px 13px}
  .sess-date{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 10px;text-align:center;min-width:46px}
  .sess-date .d{font-family:var(--font-display);font-size:1.3rem;font-weight:700;line-height:1}
  .sess-date .m{font-size:9px;text-transform:uppercase;color:var(--muted)}
  .sess-adv{font-family:var(--font-display);font-weight:600}
  .sess-meta{font-size:11px;color:var(--muted);margin-top:2px}
  .sess-score{margin-top:5px;font-family:var(--font-display);font-weight:700}
  .sess-score .w{color:var(--ok)}.sess-score .l{color:var(--err)}
  .sess-actions{display:flex;border-top:1px solid var(--border)}
  .sess-actions button{flex:1;background:none;border:none;padding:8px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;font-family:var(--font)}
  .sess-actions button+button{border-left:1px solid var(--border)}
  .sess-actions button:hover{color:var(--text)}
  .drawer-empty{text-align:center;color:var(--muted);font-size:13px;padding:40px 20px}

  @media(max-width:760px){.meta{grid-template-columns:1fr}.ana-grid{grid-template-columns:1fr}.players{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="loader"><div class="loader-mark">ARCHI</div><div class="loader-bar"></div></div>
<div id="nav"></div>

<div class="content">
  <div class="toolbar" data-noexport>
    <span class="sync-pill"><span class="sync-dot offline" id="syncDot"></span><span id="syncText">En attente…</span><span class="sync-time" id="syncTime"></span></span>
    <button class="btn btn-sm" onclick="newSession()">＋ Nouveau</button>
    <button class="btn btn-sm" onclick="openHistory()">Historique <span id="histCount" class="muted"></span></button>
    <button class="btn btn-sm btn-primary" onclick="publishDiscord()">📢 Discord</button>
    <button class="btn btn-sm" id="exportBtn">⬇ PNG</button>
    <button class="btn btn-sm" onclick="importBackup()">Import</button>
    <button class="btn btn-sm btn-danger" onclick="resetCurrentSession()">Vider</button>
  </div>
  <div style="text-align:center"><span class="session-chip" id="sessionChip">Chargement…</span></div>

  <div class="card" id="capture">
    <div class="scrim-head">
      <div class="eyebrow">PlaZma Esport · Compte rendu</div>
      <h1 style="font-size:1.5rem" id="advTitle">Scrim</h1>
    </div>

    <div class="meta">
      <div><label>Date</label><input id="m_date" type="date"></div>
      <div><label>Équipe adverse</label><input id="m_adv" type="text" placeholder="Nom de l'équipe"></div>
    </div>

    <div class="score">
      <div class="score-team"><small>PlaZma</small><input class="score-num" id="s_plazma" type="text" value="0" maxlength="2" style="color:var(--ok)"></div>
      <div class="score-vs">VS</div>
      <div class="score-team"><small id="advLabel">Adversaire</small><input class="score-num" id="s_adv" type="text" value="0" maxlength="2" style="color:var(--err)"></div>
    </div>

    <div class="body">
      <div>
        <div class="sec-title"><span class="d" style="background:var(--mid)"></span>Games &amp; erreurs</div>
        <div id="games"></div>
      </div>

      <div>
        <div class="sec-title"><span class="d" style="background:var(--top)"></span>Analyse post-scrim</div>
        <div class="ana-grid">
          <div class="ana" style="--ac:var(--ok)"><div class="t">✦ Ce qui a bien fonctionné</div>
            <textarea id="t_bien" placeholder="Phases réussies, mécaniques propres, objectifs bien gérés…"></textarea></div>
          <div class="ana" style="--ac:var(--err)"><div class="t">✦ À corriger &amp; axes de travail</div>
            <textarea id="t_corriger" placeholder="Patterns d'erreurs, habitudes à casser, thèmes pour la prochaine session…"></textarea></div>
        </div>
      </div>

      <div>
        <div class="sec-title"><span class="d" style="background:var(--accent)"></span>Remarques individuelles</div>
        <div class="players" id="players"></div>
      </div>

      <div>
        <div class="sec-title"><span class="d" style="background:var(--warn)"></span>Bilan global</div>
        <div class="bilan">
          <div class="bilan-num"><input id="f_note" type="text" value="—" maxlength="2"><span class="bilan-over">/ 10</span></div>
          <div class="bilan-right"><label>Appréciation générale de la session</label>
            <input id="f_comment" type="text" placeholder="Résumé, niveau global montré, points de satisfaction…"></div>
        </div>
      </div>
    </div>

    <div class="foot">
      <div class="brand">PlaZma Esport · ARCHI · plazma-esport.fr</div>
      <div class="brand" id="footDate"></div>
    </div>
  </div>
</div>

<!-- Drawer historique -->
<div class="drawer-ov" id="drawerOv" onclick="closeHistory()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head"><h2 style="font-size:1.1rem">Historique</h2><button class="btn btn-icon btn-ghost" onclick="closeHistory()">✕</button></div>
  <div style="padding:14px 14px 0"><button class="btn btn-primary" style="width:100%" onclick="newSession();closeHistory()">＋ Nouveau compte rendu</button></div>
  <div class="drawer-list" id="drawerList"><div class="drawer-empty">Chargement…</div></div>
</div>

<script src="assets/plazma.js" data-section="scrim"></script>
<script>
'use strict';
PZ.mountNav('scrim', '#nav');
const db = PZ.db;
const SCRIMS_COL = 'plazma-scrims';

let ROSTER = PZ.getRoster();   // roster central (mercato)
const ERR_CATS = ['Positionnement','Objectif manqué','Rotation','Communication','Mécanique','Teamfight','Vision','Autre'];

let errors = {g1:[],g2:[],g3:[],g4:[],g5:[]};
let _errId = 0, currentDocId = null, _unsub = null, _saveT = null;
let lastSavedSig = null, suppressUntil = 0;   // garde anti-écho Firestore
const uid = () => 'e' + (++_errId);

// Signature du contenu, INSENSIBLE à l'ordre des clés (Firestore peut réordonner)
// et sans _savedAt : permet de reconnaître notre propre écho vs un vrai changement distant.
function sig(o){
  const norm = v => {
    if(Array.isArray(v)) return v.map(norm);
    if(v && typeof v==='object'){ const r={}; Object.keys(v).sort().forEach(k=>{ if(k!=='_savedAt') r[k]=norm(v[k]); }); return r; }
    return v;
  };
  return JSON.stringify(norm(o));
}
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const val = id => { const e=document.getElementById(id); return e?e.value:''; };
const set = (id,v) => { const e=document.getElementById(id); if(e) e.value=v||''; };

// ── Games ──
function buildGames(){
  const host = document.getElementById('games'); host.innerHTML='';
  for(let g=1;g<=5;g++){
    const b = document.createElement('div'); b.className='game';
    b.innerHTML = `
      <div class="game-top">
        <span class="game-num">G${g}</span>
        <select id="g${g}_result" onchange="styleResult(this);queueSave()">
          <option value="">Résultat —</option><option value="V">Victoire</option><option value="D">Défaite</option>
        </select>
      </div>
      <div class="errs">
        <div class="errs-head"><span class="lbl">Erreurs — Game ${g}</span>
          <button class="btn btn-sm btn-danger" data-noexport onclick="addError('g${g}')">+ Erreur</button></div>
        <div id="errlist_g${g}"><div class="no-err" id="errEmpty_g${g}">Aucune erreur.</div></div>
      </div>`;
    host.appendChild(b);
  }
}
function styleResult(sel){ sel.style.color = sel.value==='V'?'var(--ok)':sel.value==='D'?'var(--err)':'var(--muted)'; }

function addError(gk, data){
  const list=document.getElementById('errlist_'+gk), empty=document.getElementById('errEmpty_'+gk);
  if(empty) empty.style.display='none';
  const err = data || {id:uid(),timer:'',cat:ERR_CATS[0],desc:''};
  if(!data) errors[gk].push(err);
  const row=document.createElement('div'); row.className='err-row'; row.id='errrow_'+err.id;
  row.innerHTML=`
    <input id="errt_${err.id}" type="text" value="${esc(err.timer)}" placeholder="00:00" oninput="updErr('${gk}','${err.id}','timer',this.value)">
    <select id="errc_${err.id}" onchange="updErr('${gk}','${err.id}','cat',this.value)">${ERR_CATS.map(c=>`<option${c===err.cat?' selected':''}>${c}</option>`).join('')}</select>
    <input id="errd_${err.id}" type="text" value="${esc(err.desc)}" placeholder="Décris l'erreur…" oninput="updErr('${gk}','${err.id}','desc',this.value)">
    <button class="err-del" data-noexport onclick="removeError('${gk}','${err.id}')">✕</button>`;
  list.appendChild(row);
}
function updErr(gk,id,f,v){ const e=errors[gk].find(x=>x.id===id); if(e){ e[f]=v; queueSave(); } }
function removeError(gk,id){
  errors[gk]=errors[gk].filter(e=>e.id!==id);
  document.getElementById('errrow_'+id)?.remove();
  const empty=document.getElementById('errEmpty_'+gk); if(empty&&!errors[gk].length) empty.style.display='';
  queueSave();
}
function renderErrors(){
  for(let g=1;g<=5;g++){ const gk='g'+g;
    document.querySelectorAll('#errlist_'+gk+' .err-row').forEach(r=>r.remove());
    const empty=document.getElementById('errEmpty_'+gk);
    if(errors[gk]&&errors[gk].length){ if(empty)empty.style.display='none'; errors[gk].forEach(e=>addError(gk,e)); }
    else if(empty) empty.style.display='';
  }
}

// ── Players ──
function buildPlayers(){
  const grid=document.getElementById('players'); grid.innerHTML='';
  ROSTER.forEach(p=>{
    const c=document.createElement('div'); c.className='pcard'; c.style.setProperty('--role',p.color); c.dataset.id=p.id;
    c.innerHTML=`<div class="h"><span class="pc-emoji">${p.emoji}</span><div><div class="n pc-name" style="color:${p.color}">${esc(p.name)}</div><div class="r">${p.role}</div></div></div>
      <textarea id="rem_${p.id}" placeholder="Performance, comportement, point à retravailler…"></textarea>`;
    grid.appendChild(c);
  });
}
// Met à jour noms/emojis sans détruire les textareas (mercato en direct)
PZ.onRoster(r => {
  ROSTER = r;
  const grid = document.getElementById('players');
  if (!grid || !grid.children.length) return;
  r.forEach(p => {
    const card = grid.querySelector(`.pcard[data-id="${p.id}"]`);
    if (card){ card.querySelector('.pc-emoji').textContent = p.emoji; card.querySelector('.pc-name').textContent = p.name; }
  });
});

// ── State ──
function getState(){
  const s={ m_date:val('m_date'), m_adv:val('m_adv'), s_plazma:val('s_plazma'), s_adv:val('s_adv'),
    t_bien:val('t_bien'), t_corriger:val('t_corriger'), f_note:val('f_note'), f_comment:val('f_comment'),
    errors:JSON.parse(JSON.stringify(errors)) };
  for(let g=1;g<=5;g++) s[`g${g}_result`]=val(`g${g}_result`);
  ROSTER.forEach(p=>s['rem_'+p.id]=val('rem_'+p.id));
  return s;
}
function applyState(s){
  if(!s) return;
  ['m_date','m_adv','s_plazma','s_adv','t_bien','t_corriger','f_note','f_comment'].forEach(k=>set(k,s[k]));
  for(let g=1;g<=5;g++){ set(`g${g}_result`,s[`g${g}_result`]); const sel=document.getElementById(`g${g}_result`); if(sel)styleResult(sel); }
  ROSTER.forEach(p=>set('rem_'+p.id,s['rem_'+p.id]));
  document.getElementById('advLabel').textContent = s.m_adv || 'Adversaire';
  document.getElementById('advTitle').textContent = s.m_adv ? 'Scrim vs ' + s.m_adv : 'Scrim';
  errors={g1:[],g2:[],g3:[],g4:[],g5:[]};
  if(s.errors) Object.keys(s.errors).forEach(gk=>{ if(s.errors[gk]) errors[gk]=[...s.errors[gk]]; });
  renderErrors();
}

// ── Firestore (multi-doc + historique) ──
const newDocId = () => 'scrim-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,6);
function updateChip(){
  const adv=val('m_adv')||'Sans titre', d=val('m_date');
  const ds=d?new Date(d+'T12:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}):'Sans date';
  document.getElementById('sessionChip').textContent='📄 '+adv+' — '+ds;
}
function save(){
  if(!db){ PZ.status('error','Firebase indisponible'); return; }
  if(!currentDocId) currentDocId=newDocId();
  PZ.status('syncing','Sauvegarde…');
  const s=getState();
  lastSavedSig=sig(s); suppressUntil=Date.now()+3000;   // on ignorera l'écho de cette écriture
  s._savedAt=firebase.firestore.FieldValue.serverTimestamp();
  db.collection(SCRIMS_COL).doc(currentDocId).set(s)
    .then(()=>{ PZ.status('connected','Synchronisé',PZ.nowTime()); updateChip(); })
    .catch(e=>{ console.error(e); PZ.status('error','Erreur Firebase'); });
}
function queueSave(){ clearTimeout(_saveT); _saveT=setTimeout(save,900); }
function startSync(docId){
  if(!db){ PZ.status('error','Firebase indisponible'); PZ.loadingDone(); return; }
  if(_unsub){ _unsub(); _unsub=null; }
  currentDocId=docId; PZ.status('syncing','Connexion…'); lastSavedSig=null; suppressUntil=0;
  _unsub=db.collection(SCRIMS_COL).doc(docId).onSnapshot(doc=>{
    if(doc.metadata.hasPendingWrites) return;            // écriture optimiste locale
    if(!doc.exists){ PZ.status('connected','Nouveau scrim',''); updateChip(); PZ.loadingDone(); return; }
    const incoming=sig(doc.data());
    // On ne reconstruit le formulaire que sur un VRAI changement distant,
    // jamais sur l'écho de nos propres sauvegardes (sinon le curseur saute).
    const isEcho = incoming===lastSavedSig || Date.now()<suppressUntil;
    if(isEcho || incoming===sig(getState())){ PZ.status('connected','Synchronisé',PZ.nowTime()); updateChip(); PZ.loadingDone(); return; }
    applyState(doc.data()); PZ.status('connected','Synchronisé',PZ.nowTime()); updateChip(); PZ.loadingDone();
  }, err=>{ console.error(err); PZ.status('error','Erreur connexion'); PZ.loadingDone(); });
}
function blankForm(){
  errors={g1:[],g2:[],g3:[],g4:[],g5:[]}; renderErrors();
  ['m_adv','t_bien','t_corriger','f_comment'].forEach(k=>set(k,''));
  set('s_plazma','0'); set('s_adv','0'); set('f_note','—');
  for(let g=1;g<=5;g++){ set(`g${g}_result`,''); const s=document.getElementById(`g${g}_result`); if(s)styleResult(s); }
  ROSTER.forEach(p=>set('rem_'+p.id,''));
  set('m_date', new Date().toISOString().split('T')[0]);
  document.getElementById('advLabel').textContent='Adversaire';
  document.getElementById('advTitle').textContent='Scrim';
}
function newSession(){
  if(!confirm('Créer un nouveau scrim vide ? Le scrim actuel reste dans l\'historique.')) return;
  blankForm(); startSync(newDocId());
}
function loadSession(id){ if(id===currentDocId){ closeHistory(); return; } startSync(id); closeHistory(); }
async function deleteSession(id,e){
  e.stopPropagation();
  if(!confirm('Supprimer définitivement ce compte rendu ?')) return;
  await db.collection(SCRIMS_COL).doc(id).delete();
  if(id===currentDocId){ blankForm(); startSync(newDocId()); }
  loadHistoryList();
}
function resetCurrentSession(){
  if(!confirm('Vider le scrim actuel (sans supprimer les autres) ?')) return;
  blankForm(); save();
}

// ── Drawer ──
function openHistory(){ document.getElementById('drawerOv').classList.add('open'); document.getElementById('drawer').classList.add('open'); loadHistoryList(); }
function closeHistory(){ document.getElementById('drawerOv').classList.remove('open'); document.getElementById('drawer').classList.remove('open'); }
async function loadHistoryList(){
  const list=document.getElementById('drawerList'); list.innerHTML='<div class="drawer-empty">Chargement…</div>';
  if(!db){ list.innerHTML='<div class="drawer-empty">Firebase indisponible.</div>'; return; }
  let docs=[];
  try{ const snap=await db.collection(SCRIMS_COL).orderBy('_savedAt','desc').get(); snap.forEach(d=>docs.push({id:d.id,...d.data()})); }
  catch{ const snap=await db.collection(SCRIMS_COL).get(); snap.forEach(d=>docs.push({id:d.id,...d.data()})); docs.sort((a,b)=>(b._savedAt?.toMillis?.()||0)-(a._savedAt?.toMillis?.()||0)); }
  document.getElementById('histCount').textContent = docs.length?'('+docs.length+')':'';
  if(!docs.length){ list.innerHTML='<div class="drawer-empty">Aucun scrim sauvegardé.</div>'; return; }
  list.innerHTML='';
  docs.forEach(doc=>{
    const active=doc.id===currentDocId;
    const date=doc.m_date?new Date(doc.m_date+'T12:00'):null;
    const day=date?date.toLocaleDateString('fr-FR',{day:'2-digit'}):'--';
    const month=date?date.toLocaleDateString('fr-FR',{month:'short'}):'---';
    let played=0,wins=0; for(let g=1;g<=5;g++){ if(doc[`g${g}_result`]){ played++; if(doc[`g${g}_result`]==='V')wins++; } }
    const gs=played?`${wins}V ${played-wins}D`:'—';
    const c=document.createElement('div'); c.className='sess'+(active?' active':'');
    c.innerHTML=`<div class="sess-main">
        <div class="sess-date"><div class="d">${day}</div><div class="m">${month}</div></div>
        <div style="flex:1;min-width:0">
          <div class="sess-adv">${esc(doc.m_adv||'Sans adversaire')}</div>
          <div class="sess-meta">${played?played+' game'+(played>1?'s':''):'Aucune game'}${active?' · en cours':''}</div>
          <div class="sess-score"><span class="w">${esc(doc.s_plazma||'0')}</span> – <span class="l">${esc(doc.s_adv||'0')}</span> <span class="muted" style="font-size:12px">${gs}</span></div>
        </div></div>
      <div class="sess-actions"><button onclick="loadSession('${doc.id}')">${active?'Modifier':'Ouvrir'}</button>
        <button onclick="deleteSession('${doc.id}',event)">Supprimer</button></div>`;
    list.appendChild(c);
  });
}

// ── Divers ──
document.getElementById('capture').addEventListener('input', e=>{
  if(e.target.id==='m_adv'){ document.getElementById('advLabel').textContent=e.target.value||'Adversaire'; document.getElementById('advTitle').textContent=e.target.value?'Scrim vs '+e.target.value:'Scrim'; }
  queueSave();
});
function importBackup(){ PZ.importFile(d=>{ applyState(d); save(); }); }
document.getElementById('exportBtn').addEventListener('click',()=>PZ.exportPNG(document.getElementById('capture'),'archi-scrim'));
document.getElementById('footDate').textContent='Mise à jour le '+new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});

// ── Publication Discord (embed écrit) ──
function buildScrimEmbed(s){
  const trunc=(t,n)=>{ t=String(t||'').trim(); return t.length>n? t.slice(0,n-1)+'…':t; };
  const adv=(s.m_adv||'Adversaire').trim();
  const a=+s.s_plazma, b=+s.s_adv;
  const color=(isFinite(a)&&isFinite(b)&&a!==b)?(a>b?0x22c55e:0xef4444):0x94a3b8;
  const dateStr=s.m_date?new Date(s.m_date+'T12:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'}):'—';
  const fields=[
    {name:'📅 Date',  value:dateStr, inline:true},
    {name:'🎯 Score', value:`${s.s_plazma||0} – ${s.s_adv||0}`, inline:true},
    {name:'⭐ Bilan', value:(s.f_note&&s.f_note!=='—')?`${s.f_note}/10`:'—', inline:true},
  ];
  const games=[]; for(let g=1;g<=5;g++){ const r=s['g'+g+'_result']; if(r) games.push(`G${g} ${r==='V'?'✅':'❌'}`); }
  if(games.length) fields.push({name:'🎮 Games', value:games.join('   ·   ')});
  let et='';
  for(let g=1;g<=5;g++){ const arr=(s.errors&&s.errors['g'+g])||[]; if(arr.length){
    et+=`**Game ${g}**\n`+arr.map(e=>`• \`${e.timer||'--:--'}\` **${e.cat}**${e.desc?' — '+e.desc:''}`).join('\n')+'\n'; } }
  if(et.trim()) fields.push({name:'❌ Erreurs relevées', value:trunc(et,1024)});
  if((s.t_bien||'').trim())     fields.push({name:'✅ Ce qui a marché', value:trunc(s.t_bien,1024)});
  if((s.t_corriger||'').trim()) fields.push({name:'🔧 À corriger', value:trunc(s.t_corriger,1024)});
  const pl=ROSTER.map(p=>{ const r=(s['rem_'+p.id]||'').trim(); return r?`**${p.name}** — ${r}`:''; }).filter(Boolean).join('\n');
  if(pl) fields.push({name:'👤 Remarques individuelles', value:trunc(pl,1024)});
  if((s.f_comment||'').trim()) fields.push({name:'📝 Appréciation générale', value:trunc(s.f_comment,1024)});
  return { title:trunc(`📋 CR Scrim — PlaZma vs ${adv}`,256), color, fields,
    footer:{text:'ARCHI · PlaZma Esport'}, timestamp:new Date().toISOString() };
}
function publishDiscord(){
  const s=getState();
  if(!(s.m_adv||'').trim() && !confirm('Aucun adversaire renseigné. Publier quand même ?')) return;
  PZ.discord.publish({ channel:'scrim', embed:buildScrimEmbed(s) });
}

// Init
buildGames(); buildPlayers();
(async()=>{
  if(!db){ PZ.status('error','Firebase indisponible'); PZ.loadingDone(); blankForm(); return; }
  // Lien profond depuis le calendrier : #<docId> ouvre ce CR précis.
  const hashId=(location.hash||'').replace(/^#/,'').trim();
  if(hashId){ startSync(hashId); return; }
  try{ const snap=await db.collection(SCRIMS_COL).orderBy('_savedAt','desc').limit(1).get();
    startSync(snap.empty?newDocId():snap.docs[0].id); }
  catch{ startSync(newDocId()); }
})();
</script>
