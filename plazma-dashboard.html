<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHI — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/theme.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  .content{max-width:1180px;margin:0 auto;padding:22px var(--gut) 80px;display:flex;flex-direction:column;gap:20px}
  .dash-top{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .dash-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .kpi{position:relative;overflow:hidden;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px}
  .kpi::before{content:'';position:absolute;left:0;top:0;right:0;height:3px;background:var(--kc,var(--accent));opacity:.85}
  .kpi-lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .kpi-val{font-family:var(--font-display);font-size:2.3rem;font-weight:700;line-height:1;letter-spacing:-.02em}
  .kpi-sub{font-size:12px;color:var(--muted);margin-top:7px}
  .kpi-sub b{color:var(--dim)}
  .up{color:var(--ok)}.dn{color:var(--err)}.neu{color:var(--muted)}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
  .panel-h{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
  .panel-h .card-title{font-size:1rem}
  .plink{font-size:12px;font-weight:600;color:var(--accent);cursor:pointer}
  .plink:hover{text-decoration:underline}

  /* Cette semaine */
  .wk-chips{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .wk-total{font-size:13px;color:var(--dim);margin-right:6px}
  .wk-total b{color:var(--text);font-weight:700}
  .wk-chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:20px;color:var(--wc);background:color-mix(in srgb,var(--wc) 14%,transparent)}
  .wk-next{margin-top:13px;padding-top:12px;border-top:1px solid var(--border);font-size:13px;color:var(--dim)}
  .wk-next b{color:var(--text)}
  .wk-next .none{color:var(--muted)}

  /* Prochain adversaire */
  .opp-name{font-family:var(--font-display);font-size:1.5rem;font-weight:700;letter-spacing:-.01em}
  .opp-meta{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:8px;font-size:12.5px;color:var(--muted)}
  .opp-meta b{color:var(--dim);font-weight:600}
  .threat{display:inline-block;padding:3px 11px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.03em;margin-top:12px}

  /* Roster SoloQ */
  .roster{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  .pcard{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column}
  .pc-strip{height:3px}
  .pc-head{display:flex;align-items:center;gap:9px;padding:12px 13px;border-bottom:1px solid var(--border)}
  .pc-emo{font-size:20px}
  .pc-name{font-family:var(--font-display);font-weight:600;font-size:15px}
  .pc-role{font-size:10px;letter-spacing:.06em;text-transform:uppercase;font-weight:600}
  .pc-body{padding:11px 13px;display:flex;flex-direction:column;gap:9px}
  .pc-lbl{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
  .pc-row{display:flex;gap:6px}
  .pc-row>div{flex:1}
  .pc-rank{font-family:var(--font-display);font-weight:600;font-size:15px}
  .pc-lp{font-size:11px;color:var(--muted);margin-top:2px}
  .btn-opgg{display:block;text-align:center;margin-top:2px;font-size:11px;font-weight:600;color:var(--accent);
    background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:8px;padding:7px;cursor:pointer}
  .btn-opgg.off{color:var(--muted);background:transparent;border-color:var(--border)}

  /* Résultats */
  .forme{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
  .forme-lbl{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-right:4px}
  .wl-dot{width:16px;height:16px;border-radius:4px;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff}
  .mtable{width:100%;border-collapse:collapse;font-size:13px}
  .mtable th{text-align:left;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:8px 10px;border-bottom:1px solid var(--border)}
  .mtable td{padding:9px 10px;border-bottom:1px solid var(--border)}
  .mtable tr[data-row]{cursor:pointer}
  .mtable tr[data-row]:hover td{background:var(--surface-2)}
  .mres{font-weight:700;font-size:12px}
  .mres.W{color:var(--ok)}.mres.L{color:var(--err)}.mres.D{color:var(--muted)}
  .mtype{font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:999px;background:var(--surface-2);border:1px solid var(--border);color:var(--dim)}
  .mtype.offi{color:var(--support);border-color:var(--support);background:color-mix(in srgb,var(--support) 12%,transparent)}
  .empty{padding:24px;text-align:center;color:var(--muted);font-size:13px}
  .empty a{color:var(--accent);cursor:pointer}

  /* Objectifs */
  .objs{display:flex;flex-direction:column;gap:9px}
  .obj{position:relative;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;cursor:pointer}
  .obj::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;background:var(--oc,var(--accent))}
  .obj-top{display:flex;justify-content:space-between;gap:10px;margin-bottom:9px}
  .obj-name{font-weight:600;font-size:14px}
  .obj-badges{display:flex;gap:6px;flex-shrink:0}
  .obj-bar{display:flex;align-items:center;gap:10px}
  .obj-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
  .obj-fill{height:100%;border-radius:3px}
  .obj-pct{font-family:var(--font-mono);font-weight:700;font-size:13px;min-width:38px;text-align:right}
  .obj-dl{font-size:11px;color:var(--muted);margin-top:7px}

  .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .rcr{display:grid;grid-template-columns:22px 120px 1fr;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
  .rcr:last-child{border-bottom:none}
  .field{margin-bottom:11px}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--elevated);border:1px solid var(--border-2);
    border-radius:9px;padding:10px 16px;font-size:13px;font-weight:500;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none}
  .toast.show{opacity:1}

  @media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.roster{grid-template-columns:repeat(3,1fr)}.grid2,.settings-grid{grid-template-columns:1fr}}
  @media(max-width:520px){.roster{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="loader"><div class="loader-mark">ARCHI</div><div class="loader-bar"></div></div>
<div id="nav"></div>

<div class="content">
  <div class="dash-top">
    <div>
      <div class="eyebrow" id="dateSub">—</div>
      <h1>Dashboard</h1>
    </div>
    <div class="dash-actions">
      <span class="sync-pill"><span class="sync-dot offline" id="syncDot"></span><span id="syncText">En attente…</span><span class="sync-time" id="syncTime"></span></span>
      <button class="btn btn-sm" id="btnRefresh" title="Recharger les données agrégées">↻ Actualiser</button>
      <button class="btn btn-sm" id="btnBackup">Backup</button>
      <button class="btn btn-sm" id="btnImport">Import</button>
      <button class="btn btn-sm btn-danger" id="btnReset">Reset</button>
      <button class="btn btn-sm btn-primary" onclick="openAddOffi()">＋ Officiel</button>
    </div>
  </div>

  <div class="kpis" id="kpis"></div>

  <!-- CETTE SEMAINE (agrégé du Planning) -->
  <div class="panel">
    <div class="panel-h">
      <div class="card-title">Cette semaine</div>
      <span class="plink" onclick="location.href='plazma-schedule.html'">Planning →</span>
    </div>
    <div id="weekBox"></div>
  </div>

  <div class="grid2">
    <!-- RÉSULTATS (scrims lus des CR + officiels) -->
    <div class="panel">
      <div class="panel-h">
        <div class="card-title">Résultats récents</div>
        <span class="plink" onclick="location.href='plazma-scrim.html'">CR de scrim →</span>
      </div>
      <div id="resultsBox"></div>
    </div>

    <!-- PROCHAIN ADVERSAIRE (agrégé du Scouting) -->
    <div class="panel">
      <div class="panel-h">
        <div class="card-title">Prochain adversaire</div>
        <span class="plink" onclick="location.href='plazma-scouting.html'">Scouting →</span>
      </div>
      <div id="oppBox"></div>
    </div>
  </div>

  <!-- ROSTER SOLOQ -->
  <div class="panel">
    <div class="panel-h">
      <div class="card-title">Roster — Rangs SoloQ EUW</div>
      <button class="btn btn-sm" onclick="saveRanks()">Enregistrer les rangs</button>
    </div>
    <div class="roster" id="roster"></div>
  </div>

  <!-- OBJECTIFS -->
  <div class="panel">
    <div class="panel-h">
      <div class="card-title">Objectifs de la saison</div>
      <button class="btn btn-sm" onclick="openAddObj()">＋ Ajouter</button>
    </div>
    <div class="objs" id="objList"></div>
  </div>

  <details class="panel">
    <summary style="cursor:pointer;font-family:var(--font-display);font-weight:600">Paramètres</summary>
    <div class="settings-grid" style="margin-top:14px">
      <div>
        <div class="eyebrow" style="margin-bottom:10px">Prochain événement</div>
        <div class="field"><label>Nom</label><input type="text" id="p_nextEvent" placeholder="ex : Nexus Tour Phase 1"></div>
        <div class="field-row">
          <div class="field"><label>Date</label><input type="date" id="p_nextEventDate"></div>
          <div class="field"><label>Objectif</label><input type="text" id="p_goal" placeholder="ex : Top 4"></div>
        </div>
      </div>
      <div>
        <div class="eyebrow" style="margin-bottom:10px">Identifiants op.gg (format PseudoTag-EUW)</div>
        <div id="rosterConfig"></div>
      </div>
    </div>
    <div style="text-align:right;margin-top:12px"><button class="btn btn-sm btn-primary" onclick="saveSettings()">Enregistrer</button></div>
  </details>
</div>

<!-- MODAL MATCH OFFICIEL -->
<div class="overlay" id="ovMatch">
  <div class="modal">
    <div class="modal-title" id="mTitle">Ajouter un match officiel</div>
    <div class="field-row">
      <div class="field"><label>Adversaire *</label><input type="text" id="mOpp" placeholder="Nom de l'équipe"></div>
      <div class="field"><label>Date</label><input type="date" id="mDate"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Résultat</label><select id="mRes"><option value="W">✅ Victoire</option><option value="L">❌ Défaite</option><option value="D">〰 Nul</option></select></div>
      <div class="field"><label>Score (ex : 2-1)</label><input type="text" id="mScore" placeholder="—"></div>
    </div>
    <div class="field"><label>Note</label><textarea id="mNote" rows="2" placeholder="Compétition, faits marquants…"></textarea></div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="mDel" style="display:none;flex:0" onclick="deleteOffi()">Supprimer</button>
      <button class="btn btn-ghost" onclick="closeModals()">Annuler</button>
      <button class="btn btn-primary" id="mConf">Ajouter</button>
    </div>
  </div>
</div>

<!-- MODAL OBJECTIF -->
<div class="overlay" id="ovObj">
  <div class="modal">
    <div class="modal-title" id="oTitle">Ajouter un objectif</div>
    <div class="field"><label>Objectif *</label><input type="text" id="oName" placeholder="ex : Atteindre 8.5 CS/min"></div>
    <div class="field-row">
      <div class="field"><label>Priorité</label><select id="oPrio"><option value="high">🔴 Urgent</option><option value="medium">🟠 Normal</option><option value="low">🟢 Faible</option></select></div>
      <div class="field"><label>Statut</label><select id="oStatus"><option value="todo">À faire</option><option value="progress">En cours</option><option value="done">Terminé</option></select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Progression (%)</label><input type="number" id="oPct" placeholder="0" min="0" max="100"></div>
      <div class="field"><label>Échéance</label><input type="date" id="oDl"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="oDel" style="display:none;flex:0" onclick="deleteObj()">Supprimer</button>
      <button class="btn btn-ghost" onclick="closeModals()">Annuler</button>
      <button class="btn btn-primary" id="oConf">Ajouter</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="assets/plazma.js" data-section="dashboard"></script>
<script>
'use strict';
PZ.mountNav('dashboard', '#nav');
let _editId = null;

// Tiers SoloQ (roster)
const TIER = {
  IRON:{fr:'FER',color:'#9ca3af'}, BRONZE:{fr:'BRONZE',color:'#b45309'}, SILVER:{fr:'ARGENT',color:'#94a3b8'},
  GOLD:{fr:'OR',color:'#f59e0b'}, PLATINUM:{fr:'PLATINE',color:'#06b6d4'}, EMERALD:{fr:'ÉMERAUDE',color:'#22c55e'},
  DIAMOND:{fr:'DIAMANT',color:'#3b82f6'}, MASTER:{fr:'MASTER',color:'#a855f7'}, GRANDMASTER:{fr:'GRAND MAÎTRE',color:'#ef4444'},
  CHALLENGER:{fr:'CHALLENGER',color:'#f59e0b'}, UNRANKED:{fr:'NON CLASSÉ',color:'#64748b'},
};
// Types de session (Planning) — pour les puces « Cette semaine »
const DAYS = ["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
const PTYPES = {
  scrim:{l:'Scrim',c:'#3b82f6'}, soloq:{l:'SoloQ',c:'#ef4444'}, repos:{l:'Repos',c:'#22c55e'},
  match:{l:'Match Offi',c:'#f97316'}, coaching:{l:'Coaching',c:'#ec4899'}, review:{l:'Review VOD',c:'#a855f7'},
  flexq:{l:'FlexQ',c:'#f59e0b'}, atelier:{l:'Atelier',c:'#2dd4bf'}, autre:{l:'Autre',c:'#94a3b8'},
};

let state = {
  nextEvent:'', nextEventDate:'', goal:'',
  roster:[
    {id:'boulou', name:'Boulou', role:'Top', emoji:'👍', color:'#f59e0b', opgg:'', tier:'UNRANKED', rank:'', lp:0, wr:null},
    {id:'zugu', name:'Zugu', role:'Jungle', emoji:'🕊️', color:'#22c55e', opgg:'', tier:'UNRANKED', rank:'', lp:0, wr:null},
    {id:'lakrael', name:'Lakraël', role:'Mid', emoji:'👀', color:'#3b82f6', opgg:'', tier:'UNRANKED', rank:'', lp:0, wr:null},
    {id:'ke1do', name:'Ke1do', role:'ADC', emoji:'🐯', color:'#ef4444', opgg:'', tier:'UNRANKED', rank:'', lp:0, wr:null},
    {id:'sayro', name:'Joordy', role:'Support', emoji:'🥀', color:'#a855f7', opgg:'', tier:'UNRANKED', rank:'', lp:0, wr:null},
  ],
  objectives:[], officials:[],
};
// Données agrégées (lues ailleurs, non stockées ici)
let agg = { scrims:null, scrimsDenied:false, scoutLatest:null, scoutDenied:false, week:null, weekDenied:false, loaded:false };

// ── Helpers date / semaine ──
const _now = () => new Date();
function getWeekNum(d){ d=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())); const day=d.getUTCDay()||7; d.setUTCDate(d.getUTCDate()+4-day); const y1=new Date(Date.UTC(d.getUTCFullYear(),0,1)); return Math.ceil((((d-y1)/86400000)+1)/7); }
function currentWeekValue(){ const n=new Date(); return `${n.getFullYear()}-W${String(getWeekNum(n)).padStart(2,'0')}`; }
function mondayOfCurrentWeek(){ const n=new Date(); const day=n.getDay(); const mon=new Date(n); mon.setDate(n.getDate()-(day===0?6:day-1)); mon.setHours(0,0,0,0); return mon; }
const parseHM = t => (/^\d{1,2}:\d{2}$/.test(t||'') ? (+t.split(':')[0])*60 + (+t.split(':')[1]) : null);
function slotDurMin(s){ const a=parseHM(s.start), b=parseHM(s.end); if(a==null||b==null) return null; let d=b-a; if(d<0) d+=1440; return d; }
function fmtDur(min){ if(!min||min<=0) return ''; const h=Math.floor(min/60), m=min%60; return h ? (m?`${h}h${String(m).padStart(2,'0')}`:`${h}h`) : `${m}min`; }

// ── Résultats (scrims des CR + officiels) ──
function scrimResult(s){ const a=+(s.s_plazma), b=+(s.s_adv); if(!isFinite(a)||!isFinite(b)||(a+b)===0) return null; return a>b?'W':a<b?'L':'D'; }
function scrimRows(){ return (agg.scrims||[]).map(s=>({date:s.m_date||'', opp:s.m_adv||'—', score:(s.s_plazma||'0')+'–'+(s.s_adv||'0'), result:scrimResult(s), type:'Scrim'})).filter(r=>r.result); }
function offiRows(){ return (state.officials||[]).map(o=>({id:o.id, date:o.date||'', opp:o.opp||'—', score:o.score||'—', result:o.result, type:'Officiel'})); }
function allRows(){ return [...scrimRows(), ...offiRows()].sort((a,b)=>(a.date>b.date?-1:a.date<b.date?1:0)); }
function record(rows){ const w=rows.filter(r=>r.result==='W').length, l=rows.filter(r=>r.result==='L').length, d=rows.filter(r=>r.result==='D').length; const t=w+l; return {w,l,d,total:t,wr:t?Math.round(w/t*100):null}; }
function streak(rows){ let n=0,ty=''; for(const r of rows){ if(!ty){ty=r.result;n=1;} else if(r.result===ty) n++; else break; } return {n,ty}; }

// ── RENDER ──
function render(){ renderKPIs(); renderWeek(); renderResults(); renderOpp(); renderRoster(); renderObjectives(); renderSettingsForm(); }

function renderKPIs(){
  const sc=record(scrimRows()), off=record(offiRows());
  const st=streak(allRows());
  const sTxt = st.n===0?'—':(st.n+(st.ty==='W'?'V':st.ty==='L'?'D':'N'));
  const sCls = st.ty==='W'?'up':st.ty==='L'?'dn':'neu';
  const evtName=state.nextEvent||'Non configuré';
  const evtDate=state.nextEventDate?new Date(state.nextEventDate+'T12:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}):'';
  const daysLeft=state.nextEventDate?Math.ceil((new Date(state.nextEventDate+'T12:00')-_now())/86400000):null;
  const scWrTxt = agg.scrimsDenied?'—':(sc.wr!==null?sc.wr+'%':'—');
  const scColor = sc.wr===null?'var(--text)':sc.wr>=50?'var(--ok)':'var(--err)';
  document.getElementById('kpis').innerHTML=`
    <div class="kpi" style="--kc:${sc.wr!==null&&sc.wr>=50?'var(--ok)':'var(--err)'}">
      <div class="kpi-lbl">Winrate scrims</div>
      <div class="kpi-val" style="color:${scColor}">${scWrTxt}</div>
      <div class="kpi-sub">${agg.scrimsDenied?'Accès scrims requis':`<b>${sc.w}V</b> — <b>${sc.l}D</b> · ${sc.total} scrim${sc.total>1?'s':''}`}</div>
    </div>
    <div class="kpi" style="--kc:var(--support)">
      <div class="kpi-lbl">Bilan officiel</div>
      <div class="kpi-val">${off.total?`${off.w}–${off.l}`:'—'}</div>
      <div class="kpi-sub">${off.total?`${off.wr}% WR · ${off.total} match${off.total>1?'s':''}`:'Aucun match officiel'}</div>
    </div>
    <div class="kpi" style="--kc:var(--warn)">
      <div class="kpi-lbl">Forme récente</div>
      <div class="kpi-val ${sCls}">${sTxt}</div>
      <div class="kpi-sub">Série en cours</div>
    </div>
    <div class="kpi" style="--kc:var(--accent)">
      <div class="kpi-lbl">Prochain événement</div>
      <div class="kpi-val" style="font-size:${evtName.length>12?'1.1rem':'1.5rem'}">${esc(evtName)}</div>
      <div class="kpi-sub">${evtDate?`📅 ${evtDate}${daysLeft!==null?' · <b>J-'+daysLeft+'</b>':''}`:'Configurer dans Paramètres'}</div>
    </div>`;
}

function renderWeek(){
  const el=document.getElementById('weekBox');
  if(agg.weekDenied){ el.innerHTML='<div class="empty">Accès Planning requis pour ce module.</div>'; return; }
  if(agg.week===null){ el.innerHTML='<div class="empty">Chargement…</div>'; return; }
  const wk=agg.week;
  let sessions=0, totalMin=0; const per={};
  DAYS.forEach(d=>(wk[d]||[]).forEach(s=>{ sessions++; const m=slotDurMin(s)||0; totalMin+=m; const k=s.type||'autre'; per[k]=per[k]||{n:0,min:0}; per[k].n++; per[k].min+=m; }));
  if(!sessions){ el.innerHTML='<div class="empty">Aucune session planifiée cette semaine. <a onclick="location.href=\'plazma-schedule.html\'">Ouvrir le Planning →</a></div>'; return; }
  let html=`<div class="wk-chips"><span class="wk-total"><b>${sessions}</b> session${sessions>1?'s':''}${totalMin?` · <b>${fmtDur(totalMin)}</b>`:''}</span>`;
  html+=Object.keys(PTYPES).filter(k=>per[k]).map(k=>{ const p=per[k],t=PTYPES[k]; return `<span class="wk-chip" style="--wc:${t.c}"><span>${p.n}</span> ${t.l}${p.min?` · ${fmtDur(p.min)}`:''}</span>`; }).join('');
  html+=`</div>`;
  // Prochaine session
  const nx=nextSession(wk);
  html+=`<div class="wk-next">${nx?`Prochaine session : <b>${nx.day} ${nx.slot.start||''}</b> · ${(PTYPES[nx.slot.type]||PTYPES.autre).l}${nx.slot.note?` — ${esc(nx.slot.note)}`:''}`:'<span class="none">Plus de session à venir cette semaine.</span>'}</div>`;
  el.innerHTML=html;
}
function nextSession(wk){
  const mon=mondayOfCurrentWeek(), now=_now(); let best=null;
  DAYS.forEach((day,di)=>(wk[day]||[]).forEach(s=>{
    const hm=parseHM(s.start); if(hm==null) return;
    const dt=new Date(mon); dt.setDate(mon.getDate()+di); dt.setHours(Math.floor(hm/60), hm%60, 0, 0);
    if(dt>=now && (!best||dt<best.dt)) best={dt,day,slot:s};
  }));
  return best;
}

function renderResults(){
  const el=document.getElementById('resultsBox');
  if(agg.scrimsDenied && !state.officials.length){ el.innerHTML='<div class="empty">Accès aux CR de scrim requis pour le bilan.</div>'; return; }
  const rows=allRows();
  if(!rows.length){ el.innerHTML=`<div class="empty">Aucun résultat. Les scrims arrivent des <a onclick="location.href='plazma-scrim.html'">CR de scrim</a>, les officiels via « ＋ Officiel ».</div>`; return; }
  const recent=rows.slice(0,10);
  const forme=rows.slice(0,8);
  let html=`<div class="forme"><span class="forme-lbl">Forme</span>${forme.slice().reverse().map(r=>`<span class="wl-dot" title="${esc(r.opp)} (${r.type})" style="background:${r.result==='W'?'var(--ok)':r.result==='L'?'var(--err)':'var(--muted)'}">${r.result==='W'?'V':r.result==='L'?'D':'N'}</span>`).join('')}</div>`;
  html+=`<table class="mtable"><thead><tr><th>Date</th><th>Adversaire</th><th>Type</th><th>Score</th><th>Rés.</th></tr></thead><tbody>${
    recent.map(r=>{
      const clickable=r.type==='Officiel';
      return `<tr ${clickable?`data-row onclick="openEditOffi('${r.id}')"`:''}>
        <td style="color:var(--muted)">${r.date?new Date(r.date+'T12:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}):'—'}</td>
        <td style="font-weight:600">${esc(r.opp)}</td>
        <td><span class="mtype${r.type==='Officiel'?' offi':''}">${r.type}</span></td>
        <td style="color:var(--dim)">${esc(r.score)}</td>
        <td><span class="mres ${r.result}">${r.result==='W'?'V':r.result==='L'?'D':'N'}</span></td>
      </tr>`;
    }).join('')}</tbody></table>`;
  el.innerHTML=html;
}

function renderOpp(){
  const el=document.getElementById('oppBox');
  if(agg.scoutDenied){ el.innerHTML='<div class="empty">Accès Scouting requis pour ce module.</div>'; return; }
  if(agg.scoutLatest===null){ el.innerHTML='<div class="empty">Chargement…</div>'; return; }
  const s=agg.scoutLatest;
  if(!s || !(s.m_team||'').trim()){ el.innerHTML=`<div class="empty">Aucune fiche de scouting. <a onclick="location.href='plazma-scouting.html'">Créer une fiche →</a></div>`; return; }
  const TH={low:{l:'Menace faible',c:'var(--ok)'}, med:{l:'Menace moyenne',c:'var(--warn)'}, high:{l:'Menace élevée',c:'var(--err)'}};
  const th=TH[s.threatLevel];
  el.innerHTML=`
    <div class="opp-name">${esc(s.m_team)}</div>
    <div class="opp-meta">
      ${s.m_rank?`<span><b>Rang :</b> ${esc(s.m_rank)}</span>`:''}
      ${s.m_tournoi?`<span><b>Échéance :</b> ${esc(s.m_tournoi)}</span>`:''}
    </div>
    ${th?`<div class="threat" style="color:${th.c};background:color-mix(in srgb,${th.c} 15%,transparent)">${th.l}</div>`:''}
    <div style="margin-top:14px"><span class="plink" onclick="location.href='plazma-scouting.html'">Ouvrir la fiche complète →</span></div>`;
}

    card.innerHTML=`
      <div class="pc-strip" style="background:${p.color}"></div>

      <div class="pc-body">
        <div><div class="pc-lbl">Rang SoloQ</div>
          <select onchange="setRF('${p.id}','tier',this.value)">${Object.entries(TIER).map(([k,v])=>`<option value="${k}"${p.tier===k?' selected':''}>${v.fr}</option>`).join('')}</select></div>
        <div class="pc-row">
          <div><div class="pc-lbl">Div.</div><select onchange="setRF('${p.id}','rank',this.value)"><option value="">-</option>${['IV','III','II','I'].map(r=>`<option value="${r}"${p.rank===r?' selected':''}>${r}</option>`).join('')}</select></div>
          <div><div class="pc-lbl">LP</div><input type="number" min="0" max="100" placeholder="0" value="${p.lp||''}" oninput="setRF('${p.id}','lp',+this.value)"></div>
          <div><div class="pc-lbl">WR%</div><input type="number" min="0" max="100" placeholder="—" value="${p.wr??''}" oninput="setRF('${p.id}','wr',+this.value)"></div>
        </div>
        <div style="padding-top:6px;border-top:1px solid var(--border)">
          <div class="pc-rank" style="color:${tc.color}">${tc.fr}${p.rank?' '+p.rank:''}</div>
          <div class="pc-lp">${p.lp||0} LP${p.wr!=null&&p.wr>0?' · <span style="color:'+wrColor+';font-weight:700">'+p.wr+'% WR</span>':''}</div>
        </div>
        ${url?`<a class="btn-opgg" href="${url}" target="_blank" rel="noopener">op.gg →</a>`
             :`<button class="btn-opgg off" onclick="document.querySelector('details').open=true;showToast('Configure l\\'id op.gg dans Paramètres')">Configurer op.gg</button>`}

function setRF(id,f,v){ const p=state.roster.find(x=>x.id===id); if(p)p[f]=v; }
function saveRanks(){ render(); sync.save(); showToast('Rangs enregistrés ✓'); }

function renderObjectives(){
  const list=document.getElementById('objList');
  if(!state.objectives.length){ list.innerHTML='<div class="empty">Aucun objectif. Clique sur ＋ Ajouter.</div>'; return; }
  const order={high:0,medium:1,low:2};
  const sorted=[...state.objectives].sort((a,b)=>(order[a.priority??'medium'])-(order[b.priority??'medium']));
  const today=new Date().toISOString().split('T')[0];
  list.innerHTML=sorted.map(o=>{
    const color=o.priority==='high'?'var(--err)':o.priority==='low'?'var(--ok)':'var(--warn)';
    const stLbl=o.status==='done'?'Terminé':o.status==='progress'?'En cours':'À faire';
    const overdue=o.deadline&&o.deadline<today&&o.status!=='done';
    return `<div class="obj" style="--oc:${color}" onclick="openEditObj('${o.id}')">
      <div class="obj-top"><div class="obj-name">${esc(o.name)}</div>
        <div class="obj-badges"><span class="badge" style="color:${color}">${o.priority==='high'?'Urgent':o.priority==='low'?'Faible':'Normal'}</span><span class="badge">${stLbl}</span></div></div>
      <div class="obj-bar"><div class="obj-track"><div class="obj-fill" style="width:${o.pct||0}%;background:${color}"></div></div><div class="obj-pct" style="color:${color}">${o.pct||0}%</div></div>
      ${o.deadline?`<div class="obj-dl" style="color:${overdue?'var(--err)':'var(--muted)'}">${overdue?'⚠ En retard · ':'📅 '}Échéance ${new Date(o.deadline).toLocaleDateString('fr-FR',{day:'2-digit',month:'long'})}</div>`:''}
    </div>`;
  }).join('');
}

function renderSettingsForm(){
  document.getElementById('p_nextEvent').value=state.nextEvent||'';
  document.getElementById('p_nextEventDate').value=state.nextEventDate||'';
  document.getElementById('p_goal').value=state.goal||'';
  document.getElementById('rosterConfig').innerHTML=state.roster.map(p=>`
    <div class="rcr"><div>${p.emoji}</div><div style="font-size:12px;color:var(--dim)">${esc(p.name)} <span style="color:${p.color};font-size:10px">${p.role}</span></div>
    <input id="opgg_${p.id}" value="${esc(p.opgg||'')}" placeholder="PseudoTag-EUW"></div>`).join('');

// ── SYNC (doc dashboard) ──
function getState(){ return {nextEvent:state.nextEvent,nextEventDate:state.nextEventDate,goal:state.goal,roster:state.roster,objectives:state.objectives,officials:state.officials}; }
function applyState(s){
  if(!s)return;
  Object.assign(state,{nextEvent:s.nextEvent||'',nextEventDate:s.nextEventDate||'',goal:s.goal||'',
    objectives:s.objectives??[], officials:s.officials??[]});
  if(s.roster?.length){ s.roster.forEach((sr,i)=>{ if(state.roster[i])Object.assign(state.roster[i],{opgg:sr.opgg||'',tier:sr.tier||'UNRANKED',rank:sr.rank||'',lp:sr.lp||0,wr:sr.wr??null}); }); }
}
const sync = PZ.sync({ docId:'dashboard', getState, applyState, onData:render });

// Nom/emoji depuis le roster central (mercato) ; les rangs restent liés à l'id
PZ.onRoster(r => {
  r.forEach(rp => { const p = state.roster.find(x => x.id === rp.id); if (p) { p.name = rp.name; p.emoji = rp.emoji; } });
  render();
});

// ── Agrégation (Scrim CR · Scouting · Planning) ──
async function loadAggregates(){
  const db=PZ.db; if(!db){ agg.loaded=true; return; }
  const can = s => !(PZ.auth && PZ.auth.can) || PZ.auth.can(s);
  // Scrims (CR)
  if(can('scrim')){
    try{
      let snap;
      try{ snap=await db.collection('plazma-scrims').orderBy('_savedAt','desc').limit(100).get(); }
      catch(e){ snap=await db.collection('plazma-scrims').get(); }
      const arr=[]; snap.forEach(d=>arr.push({id:d.id,...d.data()})); agg.scrims=arr;
    }catch(e){ console.error('scrims',e); agg.scrims=[]; }
  } else { agg.scrimsDenied=true; agg.scrims=[]; }
  // Scouting (dernière fiche)
  if(can('scouting')){
    try{
      let snap;
      try{ snap=await db.collection('plazma-scouting').orderBy('_savedAt','desc').limit(1).get(); }
      catch(e){ snap=await db.collection('plazma-scouting').get(); }
      let best=null; snap.forEach(d=>{ const x={id:d.id,...d.data()}; const t=x._savedAt&&x._savedAt.toMillis?x._savedAt.toMillis():0; if(!best||t>best._t) best=Object.assign(x,{_t:t}); });
      agg.scoutLatest=best||false;   // false = chargé mais vide
    }catch(e){ console.error('scouting',e); agg.scoutLatest=false; }
  } else { agg.scoutDenied=true; agg.scoutLatest=false; }
  // Planning (semaine courante)
  if(can('planning')){
    try{ const d=await db.collection(PZ.COLLECTION).doc('schedule-'+currentWeekValue()).get(); agg.week=(d.exists&&d.data().schedule)||{}; }
    catch(e){ console.error('planning',e); agg.week={}; }
  } else { agg.weekDenied=true; agg.week={}; }
  agg.loaded=true; render();
}

// ── MODAL OFFICIEL ──
function openAddOffi(){
  _editId=null;
  ['mOpp','mScore','mNote'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('mRes').value='W';
  document.getElementById('mDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('mTitle').textContent='Ajouter un match officiel';
  document.getElementById('mDel').style.display='none'; document.getElementById('mConf').textContent='Ajouter';
  document.getElementById('ovMatch').classList.add('open');
  setTimeout(()=>document.getElementById('mOpp').focus(),50);
}
function openEditOffi(id){
  const m=state.officials.find(x=>x.id===id); if(!m)return; _editId=id;
  document.getElementById('mTitle').textContent='Modifier le match officiel';
  document.getElementById('mOpp').value=m.opp||''; document.getElementById('mRes').value=m.result||'W';
  document.getElementById('mScore').value=m.score||''; document.getElementById('mDate').value=m.date||'';
  document.getElementById('mNote').value=m.note||'';
  document.getElementById('mDel').style.display='inline-flex'; document.getElementById('mConf').textContent='Enregistrer';
  document.getElementById('ovMatch').classList.add('open');
}
document.getElementById('mConf').addEventListener('click',()=>{
  const opp=document.getElementById('mOpp').value.trim(); if(!opp){showToast("L'adversaire est requis");return;}
  const data={opp,result:document.getElementById('mRes').value,score:document.getElementById('mScore').value.trim(),
    date:document.getElementById('mDate').value,note:document.getElementById('mNote').value.trim()};
  if(_editId)Object.assign(state.officials.find(m=>m.id===_editId),data); else state.officials.push({id:uid(),...data});
  closeModals(); render(); sync.save();
});
function deleteOffi(){ if(!confirm('Supprimer ce match officiel ?'))return; state.officials=state.officials.filter(m=>m.id!==_editId); closeModals(); render(); sync.save(); }

// ── MODAL OBJECTIF ──
function openAddObj(){
  _editId=null;
  document.getElementById('oTitle').textContent='Ajouter un objectif';
  document.getElementById('oName').value=''; document.getElementById('oPrio').value='medium';
  document.getElementById('oStatus').value='todo'; document.getElementById('oPct').value='0'; document.getElementById('oDl').value='';
  document.getElementById('oDel').style.display='none'; document.getElementById('oConf').textContent='Ajouter';
  document.getElementById('ovObj').classList.add('open'); setTimeout(()=>document.getElementById('oName').focus(),50);
}
function openEditObj(id){
  const o=state.objectives.find(x=>x.id===id); if(!o)return; _editId=id;
  document.getElementById('oTitle').textContent="Modifier l'objectif";
  document.getElementById('oName').value=o.name; document.getElementById('oPrio').value=o.priority;
  document.getElementById('oStatus').value=o.status; document.getElementById('oPct').value=o.pct??0; document.getElementById('oDl').value=o.deadline||'';
  document.getElementById('oDel').style.display='inline-flex'; document.getElementById('oConf').textContent='Enregistrer';
  document.getElementById('ovObj').classList.add('open');
}
document.getElementById('oConf').addEventListener('click',()=>{
  const name=document.getElementById('oName').value.trim(); if(!name){showToast("L'objectif est requis");return;}
  const data={name,priority:document.getElementById('oPrio').value,status:document.getElementById('oStatus').value,
    pct:Math.min(100,Math.max(0,parseInt(document.getElementById('oPct').value)||0)),deadline:document.getElementById('oDl').value};
  if(_editId)Object.assign(state.objectives.find(o=>o.id===_editId),data); else state.objectives.push({id:uid(),...data});
  closeModals(); render(); sync.save();
});
function deleteObj(){ if(!confirm('Supprimer cet objectif ?'))return; state.objectives=state.objectives.filter(o=>o.id!==_editId); closeModals(); render(); sync.save(); }

function saveSettings(){
  state.nextEvent=document.getElementById('p_nextEvent').value.trim();
  state.nextEventDate=document.getElementById('p_nextEventDate').value;
  state.goal=document.getElementById('p_goal').value.trim();
  state.roster.forEach(p=>{ const e=document.getElementById('opgg_'+p.id); p.opgg=e?e.value.trim():''; });
  render(); sync.save(); showToast('Paramètres enregistrés ✓');
}

// ── Toolbar ──
document.getElementById('btnRefresh').addEventListener('click',()=>{ agg={scrims:null,scrimsDenied:false,scoutLatest:null,scoutDenied:false,week:null,weekDenied:false,loaded:false}; render(); loadAggregates(); showToast('Données actualisées'); });
document.getElementById('btnBackup').addEventListener('click',()=>PZ.backup(getState(),'archi-dashboard'));
document.getElementById('btnImport').addEventListener('click',()=>PZ.importFile(d=>{applyState(d);render();sync.save();showToast('Backup importé ✓');}));
document.getElementById('btnReset').addEventListener('click',()=>{
  if(!confirm('Réinitialiser les données du dashboard (officiels, objectifs, rangs) ?'))return;
  state.officials=[]; state.objectives=[];
  state.roster.forEach(p=>Object.assign(p,{tier:'UNRANKED',rank:'',lp:0,wr:null}));
  render(); sync.save(); showToast('Réinitialisé');
});

// ── Utils ──
let _uidC=0; function uid(){ return Date.now().toString(36)+(++_uidC).toString(36); }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function closeModals(){ document.querySelectorAll('.overlay').forEach(o=>o.classList.remove('open')); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); }
document.querySelectorAll('.overlay').forEach(ov=>ov.addEventListener('click',e=>{ if(e.target===ov)closeModals(); }));
document.addEventListener('keydown',e=>{ if(e.key==='Escape')closeModals(); });

const _d=new Date();
document.getElementById('dateSub').textContent='Semaine '+getWeekNum(_d)+' · '+_d.toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
render();
if(PZ.auth && PZ.auth.ready) PZ.auth.ready.then(loadAggregates); else loadAggregates();
</script>
