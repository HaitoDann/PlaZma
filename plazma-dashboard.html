<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHI — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/theme.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
  .content{max-width:1180px;margin:0 auto;padding:22px var(--gut) 80px;display:flex;flex-direction:column;gap:22px}
  .dash-top{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .dash-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .kpi{position:relative;overflow:hidden;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px}
  .kpi::before{content:'';position:absolute;left:0;top:0;right:0;height:3px;background:var(--kc,var(--accent));opacity:.8}
  .kpi-lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .kpi-val{font-family:var(--font-display);font-size:2.3rem;font-weight:700;line-height:1;letter-spacing:-.02em}
  .kpi-sub{font-size:12px;color:var(--muted);margin-top:7px}
  .kpi-sub b{color:var(--dim)}
  .up{color:var(--ok)}.dn{color:var(--err)}.neu{color:var(--muted)}

  .roster{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  .pcard{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column}
  .pc-strip{height:3px}
  .pc-head{display:flex;align-items:center;gap:9px;padding:12px 13px;border-bottom:1px solid var(--border)}
  .pc-emo{font-size:20px}
  .pc-name{font-family:var(--font-display);font-weight:600;font-size:15px}
  .pc-role{font-size:10px;letter-spacing:.06em;text-transform:uppercase;font-weight:600}
  .pc-body{padding:11px 13px;display:flex;flex-direction:column;gap:9px}
  .pc-lbl{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
  .pc-row{display:flex;gap:6px}
  .pc-row>div{flex:1}
  .pc-rank{font-family:var(--font-display);font-weight:600;font-size:15px}
  .pc-lp{font-size:11px;color:var(--muted);margin-top:2px}
  .btn-opgg{display:block;text-align:center;margin-top:2px;font-size:11px;font-weight:600;color:var(--accent);
    background:var(--accent-soft);border:1px solid var(--accent-line);border-radius:8px;padding:7px;cursor:pointer}
  .btn-opgg.off{color:var(--muted);background:transparent;border-color:var(--border)}

  .split{display:grid;grid-template-columns:340px 1fr;gap:14px;align-items:start}
  .elo-num{font-family:var(--font-display);font-size:3.4rem;font-weight:700;line-height:1;letter-spacing:-.03em}
  .elo-tier{display:inline-block;padding:3px 12px;border-radius:999px;font-size:12px;font-weight:700;letter-spacing:.04em;margin-top:6px}
  .elo-stats{display:flex;gap:20px;margin:16px 0}
  .es-val{font-family:var(--font-display);font-size:1.4rem;font-weight:700}
  .es-lbl{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
  .chart{background:var(--surface-2);border-radius:8px;padding:8px;height:88px}
  .chart svg{width:100%;height:100%;display:block}
  .wl-dots{display:flex;gap:4px;flex-wrap:wrap;margin-top:10px}
  .wl-dot{width:12px;height:12px;border-radius:3px}

  .mfilters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .mfbtn{background:var(--surface-2);border:1px solid var(--border);color:var(--muted);padding:5px 11px;border-radius:7px;
    font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)}
  .mfbtn.active{background:var(--accent-soft);border-color:var(--accent-line);color:var(--accent)}
  .mtable{width:100%;border-collapse:collapse;font-size:13px}
  .mtable th{text-align:left;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:8px 10px;border-bottom:1px solid var(--border)}
  .mtable td{padding:10px;border-bottom:1px solid var(--border)}
  .mtable tr[data-row]{cursor:pointer}
  .mtable tr[data-row]:hover td{background:var(--surface-2)}
  .mres{font-weight:700;font-size:12px}
  .mres.W{color:var(--ok)}.mres.L{color:var(--err)}.mres.D{color:var(--muted)}
  .mtype{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;background:var(--surface-2);border:1px solid var(--border);color:var(--dim)}
  .empty{padding:28px;text-align:center;color:var(--muted);font-size:13px}

  .objs{display:flex;flex-direction:column;gap:9px}
  .obj{position:relative;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;cursor:pointer}
  .obj::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;background:var(--oc,var(--accent))}
  .obj-top{display:flex;justify-content:space-between;gap:10px;margin-bottom:9px}
  .obj-name{font-weight:600;font-size:14px}
  .obj-badges{display:flex;gap:6px;flex-shrink:0}
  .obj-bar{display:flex;align-items:center;gap:10px}
  .obj-track{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
  .obj-fill{height:100%;border-radius:3px}
  .obj-pct{font-family:var(--font-mono);font-weight:700;font-size:13px;min-width:38px;text-align:right}
  .obj-dl{font-size:11px;color:var(--muted);margin-top:7px}

  .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .rcr{display:grid;grid-template-columns:22px 120px 1fr;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
  .rcr:last-child{border-bottom:none}
  .field{margin-bottom:11px}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--elevated);border:1px solid var(--border-2);
    border-radius:9px;padding:10px 16px;font-size:13px;font-weight:500;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none}
  .toast.show{opacity:1}

  @media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.roster{grid-template-columns:repeat(3,1fr)}.split,.settings-grid{grid-template-columns:1fr}}
  @media(max-width:520px){.roster{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="loader"><div class="loader-mark">ARCHI</div><div class="loader-bar"></div></div>
<div id="nav"></div>

<div class="content">
  <div class="dash-top">
    <div>
      <div class="eyebrow" id="dateSub">—</div>
      <h1>Dashboard</h1>
    </div>
    <div class="dash-actions">
      <span class="sync-pill"><span class="sync-dot offline" id="syncDot"></span><span id="syncText">En attente…</span><span class="sync-time" id="syncTime"></span></span>
      <button class="btn btn-sm" id="btnBackup">Backup</button>
      <button class="btn btn-sm" id="btnImport">Import</button>
      <button class="btn btn-sm btn-danger" id="btnReset">Reset</button>
      <button class="btn btn-sm btn-primary" onclick="openAddMatch()">＋ Match</button>
    </div>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="panel">
    <div class="card-head" style="padding:0 0 14px;border-color:var(--border)">
      <div class="card-title" style="font-size:1rem">Roster — Rangs SoloQ EUW</div>
      <button class="btn btn-sm" onclick="saveRoster()">Enregistrer les rangs</button>
    </div>
    <div class="roster" id="roster"></div>
  </div>

  <div class="split">
    <div class="panel">
      <div class="card-title" style="font-size:1rem;margin-bottom:12px">ELO Équipe</div>
      <div id="eloBox"></div>
    </div>
    <div class="panel">
      <div class="card-head" style="padding:0 0 12px;border-color:var(--border)">
        <div class="card-title" style="font-size:1rem">Historique des matchs</div>
        <button class="btn btn-sm" onclick="openAddMatch()">＋ Ajouter</button>
      </div>
      <div class="mfilters" id="mfilters"></div>
      <div id="matchList"></div>
    </div>
  </div>

  <div class="panel">
    <div class="card-head" style="padding:0 0 14px;border-color:var(--border)">
      <div class="card-title" style="font-size:1rem">Objectifs de la saison</div>
      <button class="btn btn-sm" onclick="openAddObj()">＋ Ajouter</button>
    </div>
    <div class="objs" id="objList"></div>
  </div>

  <details class="panel">
    <summary style="cursor:pointer;font-family:var(--font-display);font-weight:600">Paramètres</summary>
    <div class="settings-grid" style="margin-top:14px">
      <div>
        <div class="eyebrow" style="margin-bottom:10px">Configuration ELO</div>
        <div class="field-row">
          <div class="field"><label>ELO de départ</label><input type="number" id="p_baseElo" placeholder="1200"></div>
          <div class="field"><label>Facteur K</label><input type="number" id="p_kFactor" placeholder="32"></div>
        </div>
        <div class="field"><label>ELO adversaire par défaut</label><input type="number" id="p_defaultOppElo" placeholder="1200"></div>
      </div>
      <div>
        <div class="eyebrow" style="margin-bottom:10px">Prochain événement</div>
        <div class="field"><label>Nom</label><input type="text" id="p_nextEvent" placeholder="ex : Nexus Tour Phase 1"></div>
        <div class="field-row">
          <div class="field"><label>Date</label><input type="date" id="p_nextEventDate"></div>
          <div class="field"><label>Objectif</label><input type="text" id="p_goal" placeholder="ex : Top 4"></div>
        </div>
      </div>
      <div style="grid-column:span 2">
        <div class="eyebrow" style="margin-bottom:8px">Identifiants op.gg (format PseudoTag-EUW)</div>
        <div id="rosterConfig"></div>
      </div>
    </div>
    <div style="text-align:right;margin-top:12px"><button class="btn btn-sm btn-primary" onclick="saveSettings()">Enregistrer</button></div>
  </details>
</div>

<!-- MODAL MATCH -->
<div class="overlay" id="ovMatch">
  <div class="modal">
    <div class="modal-title" id="mTitle">Ajouter un match</div>
    <div class="field-row">
      <div class="field"><label>Adversaire *</label><input type="text" id="mOpp" placeholder="Nom de l'équipe"></div>
      <div class="field"><label>Type</label><select id="mType"><option>Scrim</option><option>Officiel</option><option>Amical</option></select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Résultat</label><select id="mRes"><option value="W">✅ Victoire</option><option value="L">❌ Défaite</option><option value="D">〰 Nul</option></select></div>
      <div class="field"><label>Score (ex : 2-1)</label><input type="text" id="mScore" placeholder="—"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Date</label><input type="date" id="mDate"></div>
      <div class="field"><label>Patch</label><input type="text" id="mPatch" placeholder="25.06"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Durée (min)</label><input type="number" id="mDur" placeholder="30"></div>
      <div class="field"><label>ELO adversaire</label><input type="number" id="mOppElo" placeholder="1200"></div>
    </div>
    <div class="field"><label>Note</label><textarea id="mNote" rows="2" placeholder="Résumé, points forts/faibles…"></textarea></div>
    <div class="badge" id="eloPrev" style="width:100%;justify-content:flex-start">Sélectionne un résultat pour voir la variation d'ELO</div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="mDel" style="display:none;flex:0" onclick="deleteMatch()">Supprimer</button>
      <button class="btn btn-ghost" onclick="closeModals()">Annuler</button>
      <button class="btn btn-primary" id="mConf">Ajouter</button>
    </div>
  </div>
</div>

<!-- MODAL OBJECTIF -->
<div class="overlay" id="ovObj">
  <div class="modal">
    <div class="modal-title" id="oTitle">Ajouter un objectif</div>
    <div class="field"><label>Objectif *</label><input type="text" id="oName" placeholder="ex : Atteindre 8.5 CS/min"></div>
    <div class="field-row">
      <div class="field"><label>Priorité</label><select id="oPrio"><option value="high">🔴 Urgent</option><option value="medium">🟠 Normal</option><option value="low">🟢 Faible</option></select></div>
      <div class="field"><label>Statut</label><select id="oStatus"><option value="todo">À faire</option><option value="progress">En cours</option><option value="done">Terminé</option></select></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Progression (%)</label><input type="number" id="oPct" placeholder="0" min="0" max="100"></div>
      <div class="field"><label>Échéance</label><input type="date" id="oDl"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="oDel" style="display:none;flex:0" onclick="deleteObj()">Supprimer</button>
      <button class="btn btn-ghost" onclick="closeModals()">Annuler</button>
      <button class="btn btn-primary" id="oConf">Ajouter</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="assets/plazma.js"></script>
<script>
'use strict';
PZ.mountNav('dashboard', '#nav');
let _editId = null, matchFilter = 'all';

const TIER = {
  IRON:{fr:'FER',color:'#9ca3af'}, BRONZE:{fr:'BRONZE',color:'#b45309'}, SILVER:{fr:'ARGENT',color:'#94a3b8'},
  GOLD:{fr:'OR',color:'#f59e0b'}, PLATINUM:{fr:'PLATINE',color:'#06b6d4'}, EMERALD:{fr:'ÉMERAUDE',color:'#22c55e'},
  DIAMOND:{fr:'DIAMANT',color:'#3b82f6'}, MASTER:{fr:'MASTER',color:'#a855f7'}, GRANDMASTER:{fr:'GRAND MAÎTRE',color:'#ef4444'},
  CHALLENGER:{fr:'CHALLENGER',color:'#f59e0b'}, UNRANKED:{fr:'NON CLASSÉ',color:'#64748b'},
};

let state = {
  teamElo:1200, baseElo:1200, kFactor:32, defaultOppElo:1200,
  nextEvent:'', nextEventDate:'', goal:'',
  roster:[
    {id:'boulou', name:'Boulou', role:'Top', emoji:'👍', color:'#f59e0b', opgg:'', tier:'UNRANKED', rank:'', lp:0, wr:null},
    {id:'zugu', name:'Zugu', role:'Jungle', emoji:'🕊️', color:'#22c55e', opgg:'', tier:'UNRANKED', rank:'', lp:0, wr:null},
    {id:'lakrael', name:'Lakraël', role:'Mid', emoji:'👀', color:'#3b82f6', opgg:'', tier:'UNRANKED', rank:'', lp:0, wr:null},
    {id:'ke1do', name:'Ke1do', role:'ADC', emoji:'🐯', color:'#ef4444', opgg:'', tier:'UNRANKED', rank:'', lp:0, wr:null},
    {id:'sayro', name:'Joordy', role:'Support', emoji:'🥀', color:'#a855f7', opgg:'', tier:'UNRANKED', rank:'', lp:0, wr:null},
  ],
  matches:[], objectives:[], eloHistory:[1200],
};

// ── ELO ──
function calcEloChange(te,oe,res,K){ const ea=1/(1+Math.pow(10,(oe-te)/400)); return Math.round(K*((res==='W'?1:res==='D'?.5:0)-ea)); }
function recomputeElo(){
  let elo=state.baseElo; const hist=[elo];
  [...state.matches].sort((a,b)=>a.date>b.date?1:-1).forEach(m=>{ elo=Math.max(0,elo+calcEloChange(elo,m.oppElo??state.defaultOppElo,m.result,state.kFactor)); hist.push(elo); });
  state.teamElo=elo; state.eloHistory=hist;
}
function getEloTier(e){
  if(e>=2600)return{tier:'CHALLENGER',label:'Challenger'}; if(e>=2400)return{tier:'GRANDMASTER',label:'Grand Maître'};
  if(e>=2200)return{tier:'MASTER',label:'Master'}; if(e>=2000)return{tier:'DIAMOND',label:'Diamant'};
  if(e>=1800)return{tier:'EMERALD',label:'Émeraude'}; if(e>=1600)return{tier:'PLATINUM',label:'Platine'};
  if(e>=1400)return{tier:'GOLD',label:'Or'}; if(e>=1200)return{tier:'SILVER',label:'Argent'};
  if(e>=1000)return{tier:'BRONZE',label:'Bronze'}; return{tier:'IRON',label:'Fer'};
}
function drawChart(hist){
  if(hist.length<2)return '<div class="empty" style="padding:22px 0">Ajoutez des matchs pour voir la courbe</div>';
  const W=420,H=78,mn=Math.min(...hist)-30,mx=Math.max(...hist)+30;
  const px=hist.map((v,i)=>[(i/(hist.length-1))*W,H-((v-mn)/(mx-mn||1))*H]);
  const last=hist[hist.length-1],prev=hist[hist.length-2];
  const lc=last>=prev?'#22c55e':'#ef4444', ps=px.map(p=>p.join(',')).join(' ');
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${lc}" stop-opacity=".22"/><stop offset="100%" stop-color="${lc}" stop-opacity="0"/></linearGradient></defs>
    <polygon points="${px[0][0]},${H} ${ps} ${px[px.length-1][0]},${H}" fill="url(#cg)"/>
    <polyline points="${ps}" fill="none" stroke="${lc}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="${px[px.length-1][0]}" cy="${px[px.length-1][1]}" r="4" fill="${lc}"/></svg>`;
}

// ── RENDER ──
function render(){ recomputeElo(); renderKPIs(); renderRoster(); renderElo(); renderMatches(); renderObjectives(); renderSettingsForm(); }

function renderKPIs(){
  const wins=state.matches.filter(m=>m.result==='W').length, losses=state.matches.filter(m=>m.result==='L').length;
  const total=wins+losses, wr=total>0?Math.round(wins/total*100):null;
  const t=getEloTier(state.teamElo), tc=TIER[t.tier];
  let streak=0,sType='';
  [...state.matches].sort((a,b)=>b.date>a.date?1:-1).forEach(m=>{ if(!sType){sType=m.result;streak=1;}else if(m.result===sType)streak++; });
  const sTxt=streak===0?'—':(streak+(sType==='W'?'V':sType==='L'?'D':'N'));
  const sCls=sType==='W'?'up':sType==='L'?'dn':'neu';
  const now=new Date();
  const evtName=state.nextEvent||'Non configuré';
  const evtDate=state.nextEventDate?new Date(state.nextEventDate+'T12:00').toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}):'';
  const daysLeft=state.nextEventDate?Math.ceil((new Date(state.nextEventDate+'T12:00')-now)/86400000):null;
  document.getElementById('kpis').innerHTML=`
    <div class="kpi" style="--kc:${wr!==null&&wr>=50?'var(--ok)':'var(--err)'}">
      <div class="kpi-lbl">Win Rate global</div>
      <div class="kpi-val" style="color:${wr!==null&&wr>=50?'var(--ok)':wr!==null?'var(--err)':'var(--text)'}">${wr!==null?wr+'%':'—'}</div>
      <div class="kpi-sub"><b>${wins}V</b> — <b>${losses}D</b> · ${total} match${total>1?'s':''}</div>
    </div>
    <div class="kpi" style="--kc:${tc.color}">
      <div class="kpi-lbl">ELO Équipe</div>
      <div class="kpi-val" style="color:${tc.color}">${state.teamElo}</div>
      <div class="kpi-sub"><b style="color:${tc.color}">${t.label}</b></div>
    </div>
    <div class="kpi" style="--kc:var(--warn)">
      <div class="kpi-lbl">Série en cours</div>
      <div class="kpi-val ${sCls}">${sTxt}</div>
      <div class="kpi-sub">Forme récente</div>
    </div>
    <div class="kpi" style="--kc:var(--support)">
      <div class="kpi-lbl">Prochain événement</div>
      <div class="kpi-val" style="font-size:${evtName.length>12?'1.1rem':'1.5rem'};color:var(--support)">${esc(evtName)}</div>
      <div class="kpi-sub">${evtDate?`📅 ${evtDate}${daysLeft!==null?' · <b>J-'+daysLeft+'</b>':''}`:'Configurer dans Paramètres'}</div>
    </div>`;
}

function renderRoster(){
  const grid=document.getElementById('roster'); grid.innerHTML='';
  state.roster.forEach(p=>{
    const tc=TIER[p.tier||'UNRANKED'];
    const wrColor=p.wr>=55?'var(--ok)':p.wr>=50?'var(--warn)':'var(--err)';
    const url=p.opgg?`https://www.op.gg/summoners/euw/${encodeURIComponent(p.opgg)}`:'';
    const card=document.createElement('div'); card.className='pcard';
    card.innerHTML=`
      <div class="pc-strip" style="background:${p.color}"></div>
      <div class="pc-head"><div class="pc-emo">${p.emoji}</div><div><div class="pc-name">${p.name}</div><div class="pc-role" style="color:${p.color}">${p.role}</div></div></div>
      <div class="pc-body">
        <div><div class="pc-lbl">Rang SoloQ</div>
          <select onchange="setRF('${p.id}','tier',this.value)">${Object.entries(TIER).map(([k,v])=>`<option value="${k}"${p.tier===k?' selected':''}>${v.fr}</option>`).join('')}</select></div>
        <div class="pc-row">
          <div><div class="pc-lbl">Div.</div><select onchange="setRF('${p.id}','rank',this.value)"><option value="">-</option>${['IV','III','II','I'].map(r=>`<option value="${r}"${p.rank===r?' selected':''}>${r}</option>`).join('')}</select></div>
          <div><div class="pc-lbl">LP</div><input type="number" min="0" max="100" placeholder="0" value="${p.lp||''}" oninput="setRF('${p.id}','lp',+this.value)"></div>
          <div><div class="pc-lbl">WR%</div><input type="number" min="0" max="100" placeholder="—" value="${p.wr??''}" oninput="setRF('${p.id}','wr',+this.value)"></div>
        </div>
        <div style="padding-top:6px;border-top:1px solid var(--border)">
          <div class="pc-rank" style="color:${tc.color}">${tc.fr}${p.rank?' '+p.rank:''}</div>
          <div class="pc-lp">${p.lp||0} LP${p.wr!=null&&p.wr>0?' · <span style="color:'+wrColor+';font-weight:700">'+p.wr+'% WR</span>':''}</div>
        </div>
        ${url?`<a class="btn-opgg" href="${url}" target="_blank" rel="noopener">op.gg →</a>`
             :`<button class="btn-opgg off" onclick="document.querySelector('details').open=true;showToast('Configure l\\'id op.gg dans Paramètres')">Configurer op.gg</button>`}
      </div>`;
    grid.appendChild(card);
  });
}
function setRF(id,f,v){ const p=state.roster.find(x=>x.id===id); if(p)p[f]=v; }
function saveRoster(){ render(); sync.save(); showToast('Rangs enregistrés ✓'); }

function renderElo(){
  const t=getEloTier(state.teamElo),tc=TIER[t.tier];
  const wins=state.matches.filter(m=>m.result==='W').length, losses=state.matches.filter(m=>m.result==='L').length;
  const wr=wins+losses>0?Math.round(wins/(wins+losses)*100):0;
  const lastD=state.eloHistory.length>=2?state.eloHistory.at(-1)-state.eloHistory.at(-2):null;
  const last10=[...state.matches].sort((a,b)=>b.date>a.date?1:-1).slice(0,10).reverse();
  document.getElementById('eloBox').innerHTML=`
    <div class="elo-num" style="color:${tc.color}">${state.teamElo}</div>
    <div class="elo-tier" style="color:${tc.color};background:${tc.color}22">${t.label}</div>
    <div class="elo-stats">
      <div><div class="es-val" style="color:var(--ok)">${wins}</div><div class="es-lbl">Victoires</div></div>
      <div><div class="es-val" style="color:var(--err)">${losses}</div><div class="es-lbl">Défaites</div></div>
      <div><div class="es-val">${wr}%</div><div class="es-lbl">Win Rate</div></div>
      <div><div class="es-val" style="color:${lastD==null?'var(--muted)':lastD>=0?'var(--ok)':'var(--err)'}">${lastD==null?'—':(lastD>=0?'+':'')+lastD}</div><div class="es-lbl">Dernier</div></div>
    </div>
    <div class="eyebrow" style="margin-bottom:6px">Courbe ELO · ${state.eloHistory.length-1} matchs</div>
    <div class="chart">${drawChart(state.eloHistory)}</div>
    ${last10.length?`<div class="wl-dots">${last10.map(m=>`<div class="wl-dot" title="${esc(m.opp)}" style="background:${m.result==='W'?'var(--ok)':m.result==='L'?'var(--err)':'var(--muted)'}"></div>`).join('')}</div>`:''}`;
}

function renderMatches(){
  const types=['all',...new Set(state.matches.map(m=>m.type))];
  const counts={}; state.matches.forEach(m=>counts[m.type]=(counts[m.type]||0)+1);
  document.getElementById('mfilters').innerHTML=types.map(t=>`<button class="mfbtn${matchFilter===t?' active':''}" onclick="setFilter('${t}')">${t==='all'?`Tous (${state.matches.length})`:t+` (${counts[t]||0})`}</button>`).join('');
  const filtered=matchFilter==='all'?state.matches:state.matches.filter(m=>m.type===matchFilter);
  const sorted=[...filtered].sort((a,b)=>b.date>a.date?1:-1);
  const list=document.getElementById('matchList');
  if(!sorted.length){ list.innerHTML='<div class="empty">Aucun match. Clique sur ＋ Ajouter.</div>'; return; }
  list.innerHTML=`<table class="mtable"><thead><tr><th>Date</th><th>Adversaire</th><th>Résultat</th><th>Type</th><th>Score</th><th>ΔElo</th></tr></thead><tbody>${
    sorted.map(m=>{
      const d=calcEloChange(state.teamElo,m.oppElo??state.defaultOppElo,m.result,state.kFactor);
      const ds=m.result==='W'?`+${Math.abs(d)}`:m.result==='L'?`-${Math.abs(d)}`:'±0';
      return `<tr data-row onclick="openEditMatch('${m.id}')">
        <td style="color:var(--muted)">${m.date?new Date(m.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}):'—'}</td>
        <td style="font-weight:600">${esc(m.opp)}</td>
        <td><span class="mres ${m.result}">${m.result==='W'?'VICTOIRE':m.result==='L'?'DÉFAITE':'NUL'}</span></td>
        <td><span class="mtype">${m.type}</span></td>
        <td style="color:var(--dim)">${m.score||'—'}</td>
        <td class="mono ${m.result==='W'?'up':m.result==='L'?'dn':'neu'}">${ds}</td>
      </tr>`;
    }).join('')}</tbody></table>`;
}

function renderObjectives(){
  const list=document.getElementById('objList');
  if(!state.objectives.length){ list.innerHTML='<div class="empty">Aucun objectif. Clique sur ＋ Ajouter.</div>'; return; }
  const order={high:0,medium:1,low:2};
  const sorted=[...state.objectives].sort((a,b)=>(order[a.priority??'medium'])-(order[b.priority??'medium']));
  const today=new Date().toISOString().split('T')[0];
  list.innerHTML=sorted.map(o=>{
    const color=o.priority==='high'?'var(--err)':o.priority==='low'?'var(--ok)':'var(--warn)';
    const stLbl=o.status==='done'?'Terminé':o.status==='progress'?'En cours':'À faire';
    const overdue=o.deadline&&o.deadline<today&&o.status!=='done';
    return `<div class="obj" style="--oc:${color}" onclick="openEditObj('${o.id}')">
      <div class="obj-top"><div class="obj-name">${esc(o.name)}</div>
        <div class="obj-badges"><span class="badge" style="color:${color}">${o.priority==='high'?'Urgent':o.priority==='low'?'Faible':'Normal'}</span><span class="badge">${stLbl}</span></div></div>
      <div class="obj-bar"><div class="obj-track"><div class="obj-fill" style="width:${o.pct||0}%;background:${color}"></div></div><div class="obj-pct" style="color:${color}">${o.pct||0}%</div></div>
      ${o.deadline?`<div class="obj-dl" style="color:${overdue?'var(--err)':'var(--muted)'}">${overdue?'⚠ En retard · ':'📅 '}Échéance ${new Date(o.deadline).toLocaleDateString('fr-FR',{day:'2-digit',month:'long'})}</div>`:''}
    </div>`;
  }).join('');
}

function renderSettingsForm(){
  document.getElementById('p_baseElo').value=state.baseElo;
  document.getElementById('p_kFactor').value=state.kFactor;
  document.getElementById('p_defaultOppElo').value=state.defaultOppElo;
  document.getElementById('p_nextEvent').value=state.nextEvent||'';
  document.getElementById('p_nextEventDate').value=state.nextEventDate||'';
  document.getElementById('p_goal').value=state.goal||'';
  document.getElementById('rosterConfig').innerHTML=state.roster.map(p=>`
    <div class="rcr"><div>${p.emoji}</div><div style="font-size:12px;color:var(--dim)">${p.name} <span style="color:${p.color};font-size:10px">${p.role}</span></div>
    <input id="opgg_${p.id}" value="${p.opgg||''}" placeholder="PseudoTag-EUW"></div>`).join('');
}

// ── SYNC ──
function getState(){ return {teamElo:state.teamElo,baseElo:state.baseElo,kFactor:state.kFactor,defaultOppElo:state.defaultOppElo,
  nextEvent:state.nextEvent,nextEventDate:state.nextEventDate,goal:state.goal,roster:state.roster,matches:state.matches,objectives:state.objectives,eloHistory:state.eloHistory}; }
function applyState(s){
  if(!s)return;
  Object.assign(state,{teamElo:s.teamElo??1200,baseElo:s.baseElo??1200,kFactor:s.kFactor??32,defaultOppElo:s.defaultOppElo??1200,
    nextEvent:s.nextEvent||'',nextEventDate:s.nextEventDate||'',goal:s.goal||'',matches:s.matches??[],objectives:s.objectives??[],eloHistory:s.eloHistory??[s.baseElo??1200]});
  if(s.roster?.length){ s.roster.forEach((sr,i)=>{ if(state.roster[i])Object.assign(state.roster[i],{opgg:sr.opgg||'',tier:sr.tier||'UNRANKED',rank:sr.rank||'',lp:sr.lp||0,wr:sr.wr??null}); }); }
}
const sync = PZ.sync({ docId:'dashboard', getState, applyState, onData:render });

// ── MODALS ──
function openAddMatch(){
  _editId=null;
  ['mOpp','mScore','mPatch','mNote'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('mType').value='Scrim'; document.getElementById('mRes').value='W';
  document.getElementById('mDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('mDur').value=''; document.getElementById('mOppElo').value=state.defaultOppElo;
  document.getElementById('mTitle').textContent='Ajouter un match';
  document.getElementById('mDel').style.display='none'; document.getElementById('mConf').textContent='Ajouter';
  updateEloPrev(); document.getElementById('ovMatch').classList.add('open');
  setTimeout(()=>document.getElementById('mOpp').focus(),50);
}
function openEditMatch(id){
  const m=state.matches.find(x=>x.id===id); if(!m)return; _editId=id;
  document.getElementById('mTitle').textContent='Modifier le match';
  document.getElementById('mOpp').value=m.opp; document.getElementById('mType').value=m.type;
  document.getElementById('mRes').value=m.result; document.getElementById('mScore').value=m.score||'';
  document.getElementById('mDate').value=m.date||''; document.getElementById('mPatch').value=m.patch||'';
  document.getElementById('mDur').value=m.duration||''; document.getElementById('mOppElo').value=m.oppElo??state.defaultOppElo;
  document.getElementById('mNote').value=m.note||'';
  document.getElementById('mDel').style.display='inline-flex'; document.getElementById('mConf').textContent='Enregistrer';
  updateEloPrev(); document.getElementById('ovMatch').classList.add('open');
}
function updateEloPrev(){
  const res=document.getElementById('mRes').value;
  const oe=parseInt(document.getElementById('mOppElo').value)||state.defaultOppElo;
  const d=calcEloChange(state.teamElo,oe,res,state.kFactor);
  const col=d>0?'var(--ok)':d<0?'var(--err)':'var(--muted)';
  document.getElementById('eloPrev').innerHTML=`ELO ${state.teamElo} → <strong style="color:${col}">${state.teamElo+d}</strong> (${d>0?'+':''}${d})`;
}
document.getElementById('mRes').addEventListener('change',updateEloPrev);
document.getElementById('mOppElo').addEventListener('input',updateEloPrev);
document.getElementById('mConf').addEventListener('click',()=>{
  const opp=document.getElementById('mOpp').value.trim(); if(!opp){showToast("L'adversaire est requis");return;}
  const data={opp,type:document.getElementById('mType').value,result:document.getElementById('mRes').value,
    score:document.getElementById('mScore').value.trim(),date:document.getElementById('mDate').value,
    patch:document.getElementById('mPatch').value.trim(),duration:parseInt(document.getElementById('mDur').value)||null,
    oppElo:parseInt(document.getElementById('mOppElo').value)||state.defaultOppElo,note:document.getElementById('mNote').value.trim()};
  if(_editId)Object.assign(state.matches.find(m=>m.id===_editId),data); else state.matches.push({id:uid(),...data});
  closeModals(); render(); sync.save();
});
function deleteMatch(){ if(!confirm('Supprimer ce match ?'))return; state.matches=state.matches.filter(m=>m.id!==_editId); closeModals(); render(); sync.save(); }

function openAddObj(){
  _editId=null;
  document.getElementById('oTitle').textContent='Ajouter un objectif';
  document.getElementById('oName').value=''; document.getElementById('oPrio').value='medium';
  document.getElementById('oStatus').value='todo'; document.getElementById('oPct').value='0'; document.getElementById('oDl').value='';
  document.getElementById('oDel').style.display='none'; document.getElementById('oConf').textContent='Ajouter';
  document.getElementById('ovObj').classList.add('open'); setTimeout(()=>document.getElementById('oName').focus(),50);
}
function openEditObj(id){
  const o=state.objectives.find(x=>x.id===id); if(!o)return; _editId=id;
  document.getElementById('oTitle').textContent="Modifier l'objectif";
  document.getElementById('oName').value=o.name; document.getElementById('oPrio').value=o.priority;
  document.getElementById('oStatus').value=o.status; document.getElementById('oPct').value=o.pct??0; document.getElementById('oDl').value=o.deadline||'';
  document.getElementById('oDel').style.display='inline-flex'; document.getElementById('oConf').textContent='Enregistrer';
  document.getElementById('ovObj').classList.add('open');
}
document.getElementById('oConf').addEventListener('click',()=>{
  const name=document.getElementById('oName').value.trim(); if(!name){showToast("L'objectif est requis");return;}
  const data={name,priority:document.getElementById('oPrio').value,status:document.getElementById('oStatus').value,
    pct:Math.min(100,Math.max(0,parseInt(document.getElementById('oPct').value)||0)),deadline:document.getElementById('oDl').value};
  if(_editId)Object.assign(state.objectives.find(o=>o.id===_editId),data); else state.objectives.push({id:uid(),...data});
  closeModals(); render(); sync.save();
});
function deleteObj(){ if(!confirm('Supprimer cet objectif ?'))return; state.objectives=state.objectives.filter(o=>o.id!==_editId); closeModals(); render(); sync.save(); }

function saveSettings(){
  state.baseElo=parseInt(document.getElementById('p_baseElo').value)||1200;
  state.kFactor=parseInt(document.getElementById('p_kFactor').value)||32;
  state.defaultOppElo=parseInt(document.getElementById('p_defaultOppElo').value)||1200;
  state.nextEvent=document.getElementById('p_nextEvent').value.trim();
  state.nextEventDate=document.getElementById('p_nextEventDate').value;
  state.goal=document.getElementById('p_goal').value.trim();
  state.roster.forEach(p=>{ p.opgg=document.getElementById('opgg_'+p.id)?.value.trim()||''; });
  render(); sync.save(); showToast('Paramètres enregistrés ✓');
}

// ── Toolbar ──
document.getElementById('btnBackup').addEventListener('click',()=>PZ.backup(getState(),'archi-dashboard'));
document.getElementById('btnImport').addEventListener('click',()=>PZ.importFile(d=>{applyState(d);render();sync.save();showToast('Backup importé ✓');}));
document.getElementById('btnReset').addEventListener('click',()=>{
  if(!confirm('Réinitialiser le dashboard ?'))return;
  state.matches=[]; state.objectives=[]; state.eloHistory=[state.baseElo];
  state.roster.forEach(p=>Object.assign(p,{tier:'UNRANKED',rank:'',lp:0,wr:null}));
  render(); sync.save(); showToast('Réinitialisé');
});

// ── Utils ──
let _uidC=0; function uid(){ return Date.now().toString(36)+(++_uidC).toString(36); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function closeModals(){ document.querySelectorAll('.overlay').forEach(o=>o.classList.remove('open')); }
function setFilter(f){ matchFilter=f; renderMatches(); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); }
document.querySelectorAll('.overlay').forEach(ov=>ov.addEventListener('click',e=>{ if(e.target===ov)closeModals(); }));
document.addEventListener('keydown',e=>{ if(e.key==='Escape')closeModals(); });

const _now=new Date();
function gwn(d){ const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())); const day=dt.getUTCDay()||7; dt.setUTCDate(dt.getUTCDate()+4-day); const y1=new Date(Date.UTC(dt.getUTCFullYear(),0,1)); return Math.ceil((((dt-y1)/86400000)+1)/7); }
document.getElementById('dateSub').textContent='Semaine '+gwn(_now)+' · '+_now.toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'});
render();
</script>
</body>
</html>
