<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARCHI — Accès</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/theme.css">
<style>
  body{display:flex;align-items:center;justify-content:center;padding:20px}
  .login{width:380px;max-width:100%}
  .login-brand{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:26px}
  .login-mark{
    width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;
    background:var(--accent-soft);border:1px solid var(--accent-line);
    color:var(--accent);font-family:var(--font-display);font-size:22px;font-weight:700;
  }
  .login h1{font-size:2rem;letter-spacing:.05em}
  .login-sub{font-size:12px;color:var(--muted);letter-spacing:.02em}
  .err{min-height:18px;text-align:center;font-size:12.5px;color:var(--err);margin-top:12px;opacity:0;transition:opacity .2s}
  .err.show{opacity:1}
  .login .btn{width:100%;margin-top:18px}
</style>
</head>
<body>
<div class="login">
  <div class="card" style="padding:34px 30px">
    <div class="login-brand">
      <div class="login-mark">A</div>
      <h1>ARCHI</h1>
      <div class="login-sub">Accès staff · PlaZma Esport</div>
    </div>
    <label for="pw">Mot de passe</label>
    <input type="password" id="pw" placeholder="Entrez le mot de passe" autofocus
      onkeydown="if(event.key==='Enter')login()">
    <div class="err" id="err">Mot de passe incorrect</div>
    <button class="btn btn-primary" onclick="login()">Entrer</button>
  </div>
</div>
<script>
const PASSWORD = 'plazma2026';
function login(){
  const inp = document.getElementById('pw');
  if (inp.value === PASSWORD){
    sessionStorage.setItem('pz_auth','1');
    location.href = 'index.html';
  } else {
    const err = document.getElementById('err');
    err.classList.add('show'); inp.value=''; inp.focus();
    setTimeout(()=>err.classList.remove('show'),2500);
  }
}
if (sessionStorage.getItem('pz_auth')==='1') location.href='index.html';
</script>
</body>
</html>
