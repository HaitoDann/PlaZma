<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlaZma — Accès</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#05050d;font-family:'Barlow',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(109,40,217,.14) 0%,transparent 70%)}
.box{position:relative;background:#09091a;border:1px solid #232348;border-radius:18px;padding:44px 40px 36px;width:360px;max-width:100%;box-shadow:0 0 0 1px rgba(109,40,217,.08),0 40px 80px rgba(0,0,0,.7)}
.logo{width:52px;height:52px;background:linear-gradient(135deg,#6d28d9,#8b5cf6);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:#fff;box-shadow:0 0 28px rgba(109,40,217,.45);margin:0 auto 18px}
h1{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:800;letter-spacing:5px;text-transform:uppercase;text-align:center;background:linear-gradient(135deg,#fff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.sub{text-align:center;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#4a4470;margin-bottom:32px}
label{display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#4a4470;margin-bottom:8px}
input{width:100%;background:#0e0e20;border:1px solid #232348;color:#eeeaf8;padding:13px 16px;border-radius:9px;font-size:16px;font-family:'Barlow',sans-serif;outline:none;transition:border-color .2s;text-align:center;letter-spacing:4px}
input:focus{border-color:#7c3aed}
input::placeholder{letter-spacing:1px;color:#4a4470;font-size:13px}
.err{height:18px;text-align:center;font-size:11px;color:#ef4444;margin-top:10px;opacity:0;transition:opacity .2s}
.err.show{opacity:1}
button{width:100%;margin-top:20px;background:linear-gradient(135deg,#6d28d9,#8b5cf6);color:#fff;border:none;padding:14px;border-radius:9px;font-size:12px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;font-family:'Barlow',sans-serif;transition:all .2s;box-shadow:0 0 28px rgba(109,40,217,.4)}
button:hover{transform:translateY(-1px);box-shadow:0 0 40px rgba(109,40,217,.55)}
button:active{transform:translateY(0)}
</style>
</head>
<body>
<div class="box">
  <div class="logo">PZ</div>
  <h1>PlaZma</h1>
  <div class="sub">Accès staff uniquement</div>
  <label for="pw">Mot de passe</label>
  <input type="password" id="pw" placeholder="Entrez le mot de passe" autofocus
    onkeydown="if(event.key==='Enter')login()">
  <div class="err" id="err">Mot de passe incorrect</div>
  <button onclick="login()">Entrer →</button>
</div>
<script>
// ← Change le mot de passe ici
const PASSWORD = 'plazma2026';

function login() {
  const val = document.getElementById('pw').value;
  if (val === PASSWORD) {
    sessionStorage.setItem('pz_auth', '1');
    // Redirige vers le hub
    location.href = 'index.html';
  } else {
    const err = document.getElementById('err');
    err.classList.add('show');
    document.getElementById('pw').value = '';
    document.getElementById('pw').focus();
    setTimeout(() => err.classList.remove('show'), 2500);
  }
}
// Si déjà connecté → passer directement au hub
if (sessionStorage.getItem('pz_auth') === '1') location.href = 'index.html';
</script>
</body>
</html>
